<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="24" cy="24" r="22" fill="#1a1a2e"/>
  <!-- Tic-tac-toe grid (cartoon rounded) -->
  <rect x="9" y="9" width="30" height="30" rx="4" fill="none" stroke="url(#sono)" stroke-width="2.5"/>
  <!-- Grid lines -->
  <line x1="19" y1="12" x2="19" y2="36" stroke="url(#sono)" stroke-width="2"/>
  <line x1="29" y1="12" x2="29" y2="36" stroke="url(#sono)" stroke-width="2"/>
  <line x1="12" y1="19" x2="36" y2="19" stroke="url(#sono)" stroke-width="2"/>
  <line x1="12" y1="29" x2="36" y2="29" stroke="url(#sono)" stroke-width="2"/>
  <!-- X (playful) -->
  <g stroke="#fff" stroke-width="3.5" stroke-linecap="round">
    <line x1="11" y1="12" x2="17" y2="18"/>
    <line x1="17" y1="12" x2="11" y2="18"/>
  </g>
  <!-- O (cute) -->
  <circle cx="33.5" cy="24" r="5" fill="none" stroke="#fff" stroke-width="3"/>
  <!-- Winning line hint (three doors) -->
  <line x1="12" y1="39" x2="36" y2="39" stroke="url(#sono)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="15" cy="39" r="1.8" fill="#ff6b9d"/>
  <circle cx="24" cy="39" r="1.8" fill="#a29bfe"/>
  <circle cx="33" cy="39" r="1.8" fill="#ff6b9d"/>
</svg>