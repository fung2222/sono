<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sono Game Icons - Improved</title>
  <style>
    body { background: #0f0f1a; color: #fff; font-family: system-ui; padding: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 30px; max-width: 800px; margin: 0 auto; }
    .icon-card { text-align: center; }
    .icon-card svg { width: 96px; height: 96px; background: #1a1a2e; border-radius: 16px; padding: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    h1 { text-align: center; background: linear-gradient(135deg,#ff6b9d,#a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .label { margin-top: 12px; font-size: 0.9em; color: #a29bfe; }
  </style>
</head>
<body>
  <h1>Sono Game Icons — Redesigned</h1>
  <div class="grid">
    <div class="icon-card">
      <object data="rock-paper-scissors.svg" type="image/svg+xml" width="96" height="96"></object>
      <div class="label">猜拳火柴人</div>
    </div>
    <div class="icon-card">
      <object data="memory-match.svg" type="image/svg+xml" width="96" height="96"></object>
      <div class="label">記憶配對</div>
    </div>
    <div class="icon-card">
      <object data="xo-three-doors.svg" type="image/svg+xml" width="96" height="96"></object>
      <div class="label">XO過三關</div>
    </div>
    <div class="icon-card">
      <object data="snake.svg" type="image/svg+xml" width="96" height="96"></object>
      <div class="label">貪食蛇</div>
    </div>
    <div class="icon-card">
      <object data="2048.svg" type="image/svg+xml" width="96" height="96"></object>
      <div class="label">2048</div>
    </div>
  </div>
</body>
</html>
