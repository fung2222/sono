<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="sono2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#1a1a2e"/>
  <circle cx="24" cy="24" r="20" fill="url(#sono)" opacity="0.15"/>
  <!-- Rock (cute cartoon fist) -->
  <circle cx="13" cy="20" r="7" fill="#fff" stroke="url(#sono)" stroke-width="2.5"/>
  <circle cx="10" cy="17" r="2" fill="#ff6b9d"/>
  <!-- Scissors -->
  <g stroke="url(#sono2)" stroke-width="3" stroke-linecap="round">
    <line x1="35" y1="15" x2="43" y2="15"/>
    <line x1="35" y1="29" x2="43" y2="29"/>
    <line x1="30" y1="22" x2="39" y2="22"/>
  </g>
  <!-- Stickman (playful) -->
  <circle cx="24" cy="13" r="4.5" fill="#fff" stroke="url(#sono)" stroke-width="2"/>
  <line x1="24" y1="17.5" x2="24" y2="30" stroke="url(#sono)" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="17" y2="28" stroke="url(#sono)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="31" y2="28" stroke="url(#sono)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="24" y1="30" x2="19" y2="39" stroke="url(#sono)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="30" x2="29" y2="39" stroke="url(#sono)" stroke-width="2.5" stroke-linecap="round"/>
</svg>