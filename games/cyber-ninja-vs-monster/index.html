<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cyber Ninja vs Cosmic Monster 🥷⚔️👾</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  #gameContainer { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #0a0420; }
  #gameCanvas { display: block; max-width: 100vw; max-height: 100vh; image-rendering: pixelated; cursor: crosshair; touch-action: none; }
  #hud { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; color: #fff; font-size: 14px; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
  #hudLeft, #hudRight { display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.55); padding: 8px 12px; border: 2px solid #ff3030; border-radius: 6px; }
  #hudRight { border-color: #ffcc00; }
  .hudRow { display: flex; gap: 8px; align-items: center; font-weight: bold; }
  #energyBar { width: 120px; height: 10px; background: #222; border: 1px solid #555; border-radius: 4px; overflow: hidden; }
  #energyFill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffcc00, #ff3030); transition: width 0.2s; }
  #ultimateBtn { position: absolute; bottom: 24px; right: 24px; padding: 12px 18px; background: rgba(255,48,48,0.85); color: #fff; border: 3px solid #ffcc00; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; pointer-events: auto; z-index: 20; text-shadow: 1px 1px 0 #000; box-shadow: 0 4px 0 #800; transition: transform 0.1s; }
  #ultimateBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #800; }
  #ultimateBtn:disabled { background: rgba(80,80,80,0.6); border-color: #555; color: #888; cursor: not-allowed; box-shadow: 0 4px 0 #333; }
  #attackBtn { position: absolute; bottom: 24px; left: 24px; padding: 14px 22px; background: rgba(255,200,0,0.85); color: #000; border: 3px solid #fff; border-radius: 50%; font-size: 24px; cursor: pointer; pointer-events: auto; z-index: 20; box-shadow: 0 4px 0 #806000; transition: transform 0.05s; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; }
  #attackBtn:active { transform: scale(0.9); box-shadow: 0 2px 0 #806000; }
  #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 30px; background: rgba(0,0,0,0.85); color: #ffcc00; border: 3px solid #ff3030; border-radius: 10px; font-size: 32px; font-weight: bold; text-align: center; pointer-events: none; z-index: 30; display: none; text-shadow: 3px 3px 0 #000; }
  #message.show { display: block; animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.05); } }
  #startScreen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 40; color: #fff; text-align: center; padding: 20px; }
  #startScreen h1 { font-size: 36px; color: #ff3030; text-shadow: 3px 3px 0 #ffcc00; margin-bottom: 20px; }
  #startScreen p { font-size: 16px; margin: 6px 0; color: #ddd; }
  #startScreen button { margin-top: 30px; padding: 16px 40px; background: #ff3030; color: #fff; border: 3px solid #ffcc00; border-radius: 8px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 0 #800; }
  #startScreen button:active { transform: translateY(3px); box-shadow: 0 3px 0 #800; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="540" height="960"></canvas>

  <div id="hud">
    <div id="hudLeft">
      <div class="hudRow">❤️ HP: <span id="hpVal">3</span></div>
      <div class="hudRow">💀 Score: <span id="scoreVal">0</span></div>
    </div>
    <div id="hudRight">
      <div class="hudRow">⚡ Energy</div>
      <div id="energyBar"><div id="energyFill"></div></div>
      <div class="hudRow">🌊 Wave: <span id="waveVal">1</span></div>
    </div>
  </div>

  <button id="attackBtn">⚔️</button>
  <button id="ultimateBtn">🔥 銀河終焉斬 🔥</button>

  <div id="message"></div>

  <div id="startScreen">
    <h1>🥷 CYBER NINJA ⚔️</h1>
    <p>vs</p>
    <h1 style="color:#a0ff30; text-shadow: 3px 3px 0 #ff00ff;">👾 COSMIC MONSTER 👾</h1>
    <p style="margin-top:30px; color:#ffcc00;">⚔️ 輕按 = 斬擊</p>
    <p>🔫 長按 = 狂暴亂射</p>
    <p>🔥 集滿能量 = 大蕉招</p>
    <p style="margin-top:20px; color:#aaa;">(可以鍵盤: Space = 攻擊, F = 大蕉招)</p>
    <button onclick="startGame()">⚔️ 開戰 ⚔️</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// CYBER NINJA vs COSMIC MONSTER — MVP v1
// ════════════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// Background image
const bgImg = new Image();
let bgLoaded = false;
bgImg.onload = () => { bgLoaded = true; };
bgImg.onerror = () => { bgLoaded = false; console.log('BG load failed — using gradient fallback'); };
bgImg.src = 'battlefield_bg.jpg';

// Game state
const state = {
  phase: 'menu', // menu, play, ultimate, win, lose
  heroHP: 3,
  score: 0,
  energy: 0,        // 0-100
  wave: 1,
  hits: 0,
  ultimateActive: false,
  ultimateTimer: 0,
  screenShake: 0,
  victoryTimer: 0,
  bullets: [],
  enemyBullets: [],
  particles: [],
  damageNums: [],
  attackHeld: false,
  attackCooldown: 0,
  bgFlash: 0
};

// ═══ HERO (Cyber Ninja Mecha) ═══
const hero = {
  x: W * 0.5,
  y: H * 0.72,
  w: 80,
  h: 130,
  vx: 0,
  vy: 0,
  targetX: null,
  state: 'idle', // idle, walk, attack, hit, ultimate
  stateTimer: 0,
  facing: 1, // 1 = right, -1 = left
  invincible: 0,
  ultimateCharge: 0
};

// ═══ MONSTER ═══
const monster = {
  x: W * 0.5,
  y: H * 0.28,
  w: 100,
  h: 120,
  hp: 100,
  maxHp: 100,
  state: 'spawn', // spawn, idle, attack, hurt, dying
  stateTimer: 0,
  tentaclePhase: 0,
  fireTimer: 0,
  fireRate: 90, // frames
  pulsePhase: 0
};

// ═══ INPUT ═══
canvas.addEventListener('pointerdown', (e) => {
  if (state.phase !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * W;
  const y = (e.clientY - rect.top) / rect.height * H;
  hero.targetX = x;
  state.attackHeld = true;
});

canvas.addEventListener('pointermove', (e) => {
  if (state.phase !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * W;
  hero.targetX = x;
});

canvas.addEventListener('pointerup', () => { state.attackHeld = false; });

document.getElementById('attackBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (state.phase !== 'play') return;
  state.attackHeld = true;
});
document.getElementById('attackBtn').addEventListener('pointerup', (e) => { e.preventDefault(); e.stopPropagation(); state.attackHeld = false; });
document.getElementById('attackBtn').addEventListener('pointerleave', () => { state.attackHeld = false; });

document.getElementById('ultimateBtn').addEventListener('click', () => {
  if (state.phase === 'play' && state.energy >= 100) triggerUltimate();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); state.attackHeld = true; }
  if (e.code === 'KeyF') { if (state.phase === 'play' && state.energy >= 100) triggerUltimate(); }
  if (e.code === 'Enter' && state.phase === 'menu') startGame();
});
document.addEventListener('keyup', (e) => { if (e.code === 'Space') state.attackHeld = false; });

// ═══ GAME LOOP ═══
function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  resetGame();
  state.phase = 'play';
}

function resetGame() {
  state.heroHP = 3;
  state.score = 0;
  state.energy = 0;
  state.wave = 1;
  state.bullets = [];
  state.enemyBullets = [];
  state.particles = [];
  state.damageNums = [];
  hero.x = W * 0.5;
  hero.y = H * 0.72;
  hero.state = 'idle';
  hero.invincible = 0;
  monster.hp = 100;
  monster.maxHp = 100;
  monster.state = 'spawn';
  monster.stateTimer = 0;
  state.phase = 'play';
}

function triggerUltimate() {
  state.energy = 0;
  state.ultimateActive = true;
  state.ultimateTimer = 120; // 2s @ 60fps
  hero.state = 'ultimate';
  hero.stateTimer = 120;
  state.screenShake = 30;
  state.bgFlash = 20;
  showMessage('🔥 銀河終焉斬！ 🔥');
  // Spawn slash particles in X shape
  for (let i = 0; i < 30; i++) {
    state.particles.push({
      x: monster.x + (Math.random() - 0.5) * 200,
      y: monster.y + (Math.random() - 0.5) * 200,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12,
      life: 60,
      maxLife: 60,
      color: Math.random() > 0.5 ? '#ffcc00' : '#ff3030',
      size: 6 + Math.random() * 8,
      type: 'slash'
    });
  }
  // Damage all monsters
  monster.hp -= 60;
  if (monster.hp <= 0) {
    monster.hp = 0;
    monster.state = 'dying';
    monster.stateTimer = 90;
  }
  spawnExplosion(monster.x, monster.y, '#ffcc00', 40);
}

function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    state.particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 30,
      maxLife: 60,
      color: color,
      size: 4 + Math.random() * 6,
      type: 'spark'
    });
  }
}

function spawnDamageNum(x, y, val, color) {
  state.damageNums.push({
    x: x, y: y, val: val, color: color || '#ffcc00',
    life: 40, maxLife: 40, vy: -2
  });
}

// ═══ UPDATE ═══
function update() {
  if (state.phase !== 'play' && state.phase !== 'ultimate') return;

  // Ultimate timer
  if (state.ultimateActive) {
    state.ultimateTimer--;
    if (state.ultimateTimer <= 0) {
      state.ultimateActive = false;
      hero.state = 'idle';
    }
  }

  // Screen shake decay
  if (state.screenShake > 0) state.screenShake *= 0.9;
  if (state.screenShake < 0.5) state.screenShake = 0;
  if (state.bgFlash > 0) state.bgFlash--;

  // Hero movement
  if (hero.targetX !== null && hero.state !== 'ultimate') {
    const dx = hero.targetX - hero.x;
    if (Math.abs(dx) > 5) {
      hero.vx = Math.sign(dx) * 4;
      hero.facing = dx > 0 ? 1 : -1;
      if (hero.state === 'idle') hero.state = 'walk';
    } else {
      hero.vx = 0;
      if (hero.state === 'walk') hero.state = 'idle';
    }
  }
  hero.x += hero.vx;
  hero.x = Math.max(hero.w/2, Math.min(W - hero.w/2, hero.x));

  // Hero attack cooldown
  if (state.attackCooldown > 0) state.attackCooldown--;

  // Hero shoot (held = rapid fire)
  if (state.attackHeld && hero.state !== 'ultimate' && state.attackCooldown <= 0) {
    if (state.ultimateActive) {
      // Big spread shot during ultimate
      for (let a = -0.3; a <= 0.3; a += 0.15) {
        state.bullets.push({
          x: hero.x, y: hero.y - hero.h/2,
          vx: Math.sin(a) * 8,
          vy: -12 - Math.random() * 3,
          damage: 8, color: '#ffcc00', size: 8
        });
      }
      state.attackCooldown = 4;
    } else {
      // Normal katana slash (short range bullet)
      state.bullets.push({
        x: hero.x + hero.facing * 30,
        y: hero.y - hero.h/3,
        vx: hero.facing * 6,
        vy: -3,
        damage: 5,
        color: '#ff3030',
        size: 5,
        type: 'slash'
      });
      state.attackCooldown = 12;
      hero.state = 'attack';
      hero.stateTimer = 15;
    }
  }

  // Hero energy gain from attacks
  if (state.attackHeld) state.energy = Math.min(100, state.energy + 0.3);

  // Hero state timer
  if (hero.stateTimer > 0) {
    hero.stateTimer--;
    if (hero.stateTimer === 0 && hero.state === 'attack') hero.state = 'idle';
  }
  if (hero.invincible > 0) hero.invincible--;

  // Update bullets
  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y < -20 || b.x < -20 || b.x > W + 20) {
      state.bullets.splice(i, 1);
      continue;
    }
    // Hit monster?
    if (monster.state !== 'dying' && monster.state !== 'spawn') {
      const dx = b.x - monster.x;
      const dy = b.y - monster.y;
      if (Math.abs(dx) < monster.w/2 && Math.abs(dy) < monster.h/2) {
        monster.hp -= b.damage;
        spawnDamageNum(monster.x + (Math.random()-0.5)*60, monster.y - 40, Math.floor(b.damage), b.color);
        spawnExplosion(b.x, b.y, b.color, 5);
        state.score += Math.floor(b.damage * 10);
        state.energy = Math.min(100, state.energy + 5);
        state.bullets.splice(i, 1);
        if (monster.hp <= 0) {
          monster.hp = 0;
          monster.state = 'dying';
          monster.stateTimer = 90;
          spawnExplosion(monster.x, monster.y, '#ff00ff', 50);
          showMessage('💀 BOSS DEFEATED! 💀');
        } else {
          monster.state = 'hurt';
          monster.stateTimer = 12;
        }
      }
    }
  }

  // Monster AI
  monster.tentaclePhase += 0.1;
  monster.pulsePhase += 0.05;
  if (monster.state === 'spawn') {
    monster.stateTimer++;
    if (monster.stateTimer > 60) {
      monster.state = 'idle';
      monster.stateTimer = 0;
    }
  } else if (monster.state === 'hurt') {
    monster.stateTimer--;
    if (monster.stateTimer <= 0) monster.state = 'idle';
  } else if (monster.state === 'idle' || monster.state === 'attack') {
    monster.fireTimer++;
    const adjustedRate = Math.max(30, monster.fireRate - state.wave * 5);
    if (monster.fireTimer >= adjustedRate && monster.state !== 'dying') {
      monster.fireTimer = 0;
      monster.state = 'attack';
      monster.stateTimer = 30;
      // Fire 3 bullets in spread
      for (let i = -1; i <= 1; i++) {
        state.enemyBullets.push({
          x: monster.x, y: monster.y + monster.h/2,
          vx: i * 3,
          vy: 4 + state.wave * 0.5,
          color: '#a0ff30',
          size: 6
        });
      }
    }
    if (monster.stateTimer > 0 && monster.state === 'attack') {
      monster.stateTimer--;
      if (monster.stateTimer === 0) monster.state = 'idle';
    }
  } else if (monster.state === 'dying') {
    monster.stateTimer--;
    if (monster.stateTimer <= 0) {
      // Next wave!
      state.wave++;
      monster.maxHp = 100 + (state.wave - 1) * 50;
      monster.hp = monster.maxHp;
      monster.state = 'spawn';
      monster.stateTimer = 0;
      monster.fireRate = Math.max(40, 90 - state.wave * 5);
      state.energy = Math.min(100, state.energy + 30);
      showMessage(`⚡ WAVE ${state.wave} ⚡`);
      state.score += 500;
    }
  }

  // Update enemy bullets
  for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
    const b = state.enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y > H + 20 || b.x < -20 || b.x > W + 20) {
      state.enemyBullets.splice(i, 1);
      continue;
    }
    // Hit hero?
    if (hero.invincible <= 0) {
      const dx = b.x - hero.x;
      const dy = b.y - hero.y;
      if (Math.abs(dx) < hero.w/2 && Math.abs(dy) < hero.h/2) {
        state.heroHP--;
        hero.invincible = 60;
        hero.state = 'hit';
        hero.stateTimer = 20;
        spawnExplosion(hero.x, hero.y, '#ff0000', 15);
        state.screenShake = 15;
        state.enemyBullets.splice(i, 1);
        if (state.heroHP <= 0) {
          state.phase = 'lose';
          showMessage('💀 YOU DIED 💀\nGame Over\n分數: ' + state.score);
          setTimeout(() => { document.getElementById('startScreen').style.display = 'flex'; state.phase = 'menu'; }, 2500);
        }
      }
    }
  }

  // Hero hit state timer
  if (hero.state === 'hit' && hero.stateTimer > 0) {
    hero.stateTimer--;
    if (hero.stateTimer === 0) hero.state = 'idle';
  }

  // Update particles
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.type === 'spark') {
      p.vy += 0.2;
      p.vx *= 0.96;
    }
    p.life--;
    if (p.life <= 0) state.particles.splice(i, 1);
  }

  // Update damage numbers
  for (let i = state.damageNums.length - 1; i >= 0; i--) {
    const d = state.damageNums[i];
    d.y += d.vy;
    d.life--;
    if (d.life <= 0) state.damageNums.splice(i, 1);
  }

  // Update HUD
  document.getElementById('hpVal').textContent = '❤'.repeat(Math.max(0, state.heroHP));
  document.getElementById('scoreVal').textContent = state.score;
  document.getElementById('waveVal').textContent = state.wave;
  document.getElementById('energyFill').style.width = state.energy + '%';
  document.getElementById('ultimateBtn').disabled = state.energy < 100;
}

function showMessage(text) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.classList.add('show');
  clearTimeout(showMessage._t);
  showMessage._t = setTimeout(() => msg.classList.remove('show'), 1500);
}

// ═══ DRAW ═══
function draw() {
  ctx.save();

  // Screen shake
  if (state.screenShake > 0) {
    ctx.translate((Math.random()-0.5) * state.screenShake, (Math.random()-0.5) * state.screenShake);
  }

  // Background
  if (bgLoaded) {
    // Cover-fit
    const scale = Math.max(W / bgImg.width, H / bgImg.height);
    const bw = bgImg.width * scale;
    const bh = bgImg.height * scale;
    ctx.drawImage(bgImg, (W - bw)/2, (H - bh)/2, bw, bh);
  } else {
    // Fallback gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0420');
    grad.addColorStop(0.5, '#3a0a40');
    grad.addColorStop(1, '#1a0020');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // BG flash overlay (ultimate)
  if (state.bgFlash > 0) {
    ctx.fillStyle = `rgba(255, 200, 0, ${state.bgFlash / 30})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Draw monster
  drawMonster();

  // Draw hero
  drawHero();

  // Draw bullets
  state.bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 12;
    if (b.type === 'slash') {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size * 2);
    }
    ctx.shadowBlur = 0;
  });

  // Draw enemy bullets
  state.enemyBullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Draw particles
  state.particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    if (p.type === 'slash') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p.x - p.vx * 2, p.y - p.vy * 2);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  });

  // Draw damage numbers
  state.damageNums.forEach(d => {
    ctx.globalAlpha = d.life / d.maxLife;
    ctx.fillStyle = d.color;
    ctx.font = 'bold 28px Courier New';
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(d.val, d.x, d.y);
    ctx.fillText(d.val, d.x, d.y);
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

// ═══ DRAW HERO (Cyber Ninja Mecha) ═══
function drawHero() {
  ctx.save();
  ctx.translate(hero.x, hero.y);

  if (hero.invincible > 0 && Math.floor(hero.invincible / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  // Facing flip
  ctx.scale(hero.facing, 1);

  // Idle bobbing
  let bob = 0;
  if (hero.state === 'idle') bob = Math.sin(Date.now() / 200) * 2;

  // ═══ BODY ═══
  // Cape (behind body)
  ctx.fillStyle = '#1a0000';
  ctx.beginPath();
  ctx.moveTo(-20, -20);
  ctx.lineTo(-35, 30);
  ctx.lineTo(-25, 50);
  ctx.lineTo(-15, 20);
  ctx.fill();

  // Legs
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(-15, 15, 12, 35);
  ctx.fillRect(3, 15, 12, 35);
  // Boot
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(-17, 45, 16, 8);
  ctx.fillRect(1, 45, 16, 8);

  // Hip belt
  ctx.fillStyle = '#222';
  ctx.fillRect(-20, 10, 40, 8);

  // Torso (black-red)
  ctx.fillStyle = '#2a0a0a';
  ctx.beginPath();
  ctx.moveTo(-25, -25);
  ctx.lineTo(25, -25);
  ctx.lineTo(22, 15);
  ctx.lineTo(-22, 15);
  ctx.closePath();
  ctx.fill();

  // Chest armor (red plates)
  ctx.fillStyle = '#a01010';
  ctx.fillRect(-22, -22, 18, 12);
  ctx.fillRect(4, -22, 18, 12);

  // Chest core (glowing)
  const pulse = 0.7 + Math.sin(monster.pulsePhase * 3) * 0.3;
  ctx.fillStyle = `rgba(255, 220, 50, ${pulse})`;
  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(0, -15, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Arms (varies with state)
  if (hero.state === 'attack') {
    // Both arms forward slashing
    ctx.fillStyle = '#2a0a0a';
    ctx.fillRect(15, -15, 25, 10);
    ctx.fillRect(15, -3, 25, 10);
    // Slash effect (energy blade)
    ctx.strokeStyle = '#ff3030';
    ctx.shadowColor = '#ff3030';
    ctx.shadowBlur = 20;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(40, -20);
    ctx.lineTo(60, -30);
    ctx.moveTo(40, 5);
    ctx.lineTo(60, 15);
    ctx.stroke();
    ctx.shadowBlur = 0;
  } else if (hero.state === 'ultimate') {
    // Arms raised, ultimate pose
    ctx.fillStyle = '#2a0a0a';
    ctx.save();
    ctx.translate(20, -20);
    ctx.rotate(-Math.PI / 3);
    ctx.fillRect(0, 0, 25, 10);
    ctx.restore();
    ctx.save();
    ctx.translate(20, 0);
    ctx.rotate(-Math.PI / 6);
    ctx.fillRect(0, 0, 25, 10);
    ctx.restore();
    // Golden aura
    ctx.strokeStyle = '#ffcc00';
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 25;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, -5, 50 + Math.sin(Date.now()/100) * 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  } else {
    // Idle / walk arms
    const swing = Math.sin(Date.now() / 250) * (hero.state === 'walk' ? 8 : 2);
    ctx.fillStyle = '#2a0a0a';
    ctx.save();
    ctx.translate(20, -20);
    ctx.rotate(swing * Math.PI / 180);
    ctx.fillRect(0, 0, 20, 10);
    ctx.restore();
    ctx.save();
    ctx.translate(20, 5);
    ctx.rotate(-swing * Math.PI / 180);
    ctx.fillRect(0, 0, 20, 10);
    ctx.restore();
  }

  // Shoulder pads
  ctx.fillStyle = '#1a1a2a';
  ctx.beginPath();
  ctx.arc(-22, -22, 10, 0, Math.PI * 2);
  ctx.arc(22, -22, 10, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#1a1a2a';
  ctx.beginPath();
  ctx.arc(0, -40 + bob, 18, 0, Math.PI * 2);
  ctx.fill();

  // Oni mask (red half-mask)
  ctx.fillStyle = '#a01010';
  ctx.beginPath();
  ctx.arc(0, -38 + bob, 15, Math.PI * 0.1, Math.PI * 0.9);
  ctx.fill();

  // Single eye visor (glowing)
  const eyeColor = hero.state === 'ultimate' ? '#ffcc00' : (hero.state === 'hit' ? '#ff0000' : '#00ddff');
  ctx.fillStyle = eyeColor;
  ctx.shadowColor = eyeColor;
  ctx.shadowBlur = 15;
  ctx.fillRect(-12, -42 + bob, 24, 6);
  ctx.shadowBlur = 0;

  // Topknot antenna (not V-fin)
  ctx.fillStyle = '#a01010';
  ctx.fillRect(-2, -58 + bob, 4, 8);
  ctx.beginPath();
  ctx.arc(0, -62 + bob, 6, 0, Math.PI * 2);
  ctx.fill();

  // Ninja scarf
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(-8, -25 + bob, 16, 4);

  ctx.restore();
}

// ═══ DRAW MONSTER ═══
function drawMonster() {
  ctx.save();
  ctx.translate(monster.x, monster.y);

  // Hurt flash
  if (monster.state === 'hurt' && Math.floor(monster.stateTimer / 2) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }

  // Spawn animation (scale up)
  if (monster.state === 'spawn') {
    const t = monster.stateTimer / 60;
    ctx.scale(t, t);
  }

  // Dying animation
  if (monster.state === 'dying') {
    const t = monster.stateTimer / 90;
    ctx.rotate((1 - t) * Math.PI * 2);
    ctx.globalAlpha = t;
  }

  // Tentacles (waving)
  const tent = Math.sin(monster.tentaclePhase) * 0.3;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.save();
    ctx.rotate(a + tent);
    ctx.fillStyle = '#4a0080';
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.quadraticCurveTo(15, -50, 25, -70 + Math.sin(monster.tentaclePhase + i) * 5);
    ctx.lineTo(20, -68);
    ctx.quadraticCurveTo(10, -45, -5, -25);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Body (organic alien)
  ctx.fillStyle = '#3a0060';
  ctx.beginPath();
  ctx.ellipse(0, 0, 55, 50, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pulsing inner organs
  ctx.fillStyle = `rgba(160, 255, 48, ${0.5 + Math.sin(monster.pulsePhase * 2) * 0.3})`;
  ctx.shadowColor = '#a0ff30';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.ellipse(-15, -5, 12, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(15, 10, 10, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Multiple eyes (8 in pattern)
  const eyeOffsets = [
    [-20, -25], [20, -25], [-30, -5], [30, -5],
    [-25, 20], [25, 20], [-10, -35], [10, -35]
  ];
  eyeOffsets.forEach(([ex, ey]) => {
    ctx.fillStyle = '#ffff66';
    ctx.shadowColor = '#ffff66';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(ex, ey, 5, 0, Math.PI * 2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(ex, ey, 2, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Mouth (crystalline teeth)
  ctx.fillStyle = '#1a0040';
  ctx.beginPath();
  ctx.ellipse(0, 15, 25, 10, 0, 0, Math.PI);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 6, 10);
    ctx.lineTo(i * 6 + 3, 18);
    ctx.lineTo(i * 6 + 6, 10);
    ctx.closePath();
    ctx.fill();
  }

  // HP bar
  if (monster.state !== 'dying' && monster.state !== 'spawn') {
    const barW = 100;
    const hpRatio = monster.hp / monster.maxHp;
    ctx.fillStyle = '#222';
    ctx.fillRect(-barW/2, -75, barW, 8);
    ctx.fillStyle = hpRatio > 0.5 ? '#a0ff30' : (hpRatio > 0.25 ? '#ffcc00' : '#ff3030');
    ctx.fillRect(-barW/2, -75, barW * hpRatio, 8);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(-barW/2, -75, barW, 8);
  }

  ctx.restore();
}

// ═══ MAIN LOOP ═══
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
