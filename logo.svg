<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60">
  <defs>
    <linearGradient id="wl" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="35%" stop-color="#c44569"/>
      <stop offset="65%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="50%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
  <!-- Icon (音波高度由 26 縮到 18，約 70%，即縮 30%) -->
  <!-- Centered vertically: y range shifted to ~21-39, total 18px tall -->
  <rect x="14" y="21" width="5" height="11" rx="2.5" fill="url(#wl)" opacity="0.45"/>
  <rect x="22" y="18" width="5" height="18" rx="2.5" fill="url(#wl)" opacity="0.58"/>
  <rect x="30" y="16" width="5" height="24" rx="2.5" fill="url(#wl)" opacity="0.72"/>
  <rect x="38" y="18" width="5" height="20" rx="2.5" fill="url(#wl)" opacity="0.85"/>
  <rect x="46" y="21" width="5" height="15" rx="2.5" fill="url(#wl)" opacity="0.92"/>
  <!-- Wordmark (保留原本位置同大小) -->
  <text x="60" y="40" font-family="'Segoe UI',-apple-system,sans-serif" font-size="28" font-weight="900" fill="url(#txt)" letter-spacing="3">Sono</text>
</svg>
