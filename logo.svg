<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4c898"/>
      <stop offset="50%" stop-color="#b8a878"/>
      <stop offset="100%" stop-color="#8a7d54"/>
    </linearGradient>
  </defs>
  <!-- Dark navy background -->
  <rect width="200" height="200" fill="#0a0a1a"/>
  <!-- Concentric rings (tilted -18deg), varied width/opacity for depth -->
  <g transform="rotate(-18 100 100)" fill="none" stroke="url(#goldRing)" stroke-linecap="round">
    <!-- Inner solid ring -->
    <circle cx="100" cy="100" r="42" stroke-width="3.5" opacity="0.95"/>
    <!-- Middle ring -->
    <circle cx="100" cy="100" r="66" stroke-width="2.4" opacity="0.6"/>
    <!-- Outer faint ring -->
    <circle cx="100" cy="100" r="90" stroke-width="1.6" opacity="0.32"/>
  </g>
  <!-- Center focus dot: subtle gold core -->
  <circle cx="100" cy="100" r="4" fill="#d4c898"/>
  <circle cx="100" cy="100" r="1.5" fill="#0a0a1a"/>
  <!-- Satellite on inner ring (off-center) -->
  <circle cx="142" cy="100" r="4.5" fill="#d4c898"/>
  <!-- Tiny marker on outer ring (asymmetric accent) -->
  <circle cx="56" cy="142" r="2.2" fill="#b8a878" opacity="0.7"/>
</svg>