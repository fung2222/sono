<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AI 指令格鬥 | AI Command Fighter</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: #0a0a0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
#game-wrapper {
  position: relative;
  border: 2px solid #ff2d55;
  box-shadow: 0 0 40px rgba(255,45,85,0.3), inset 0 0 20px rgba(0,0,0,0.5);
  max-width: 100vw;
  max-height: 100dvh;
}
canvas { display: block; width: 100%; height: auto; }
#hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: min(12px, 2vw) min(20px, 3vw);
  pointer-events: none;
  z-index: 10;
}
.hud-player { display: flex; align-items: center; gap: min(10px, 2vw); }
.hud-portrait {
  width: min(48px, 8vw); height: min(48px, 8vw);
  border: 2px solid;
  image-rendering: pixelated;
}
.hud-info { color: #fff; font-size: min(13px, 2.5vw); }
.hud-name { font-weight: bold; letter-spacing: 2px; margin-bottom: 2px; }
.hud-hp-bar {
  width: min(180px, 28vw); height: min(10px, 2vw);
  background: #1a1a2e; border: 1px solid #333; position: relative;
}
.hud-hp-fill { height: 100%; transition: width 0.2s; }
.p1 .hud-portrait { border-color: #00d4ff; }
.p1 .hud-hp-fill { background: linear-gradient(90deg, #00d4ff, #00ff88); }
.p2 .hud-portrait { border-color: #ff2d55; }
.p2 .hud-hp-fill { background: linear-gradient(90deg, #ff2d55, #ff6b35); }

/* ── Touch Joysticks ── */
.joystick-zone {
  position: absolute; bottom: 0;
  width: 50%; height: 100%;
  z-index: 20;
}
.joystick-zone.p1-zone { left: 0; }
.joystick-zone.p2-zone { right: 0; }

.joystick-visual {
  position: absolute; bottom: 12%;
  width: min(100px, 20vw); height: min(100px, 20vw);
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.12);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.joystick-visual.active { opacity: 1; }
.p1-zone .joystick-visual { left: 15%; }
.p2-zone .joystick-visual { right: 15%; }

.joystick-thumb {
  position: absolute;
  width: min(50px, 10vw); height: min(50px, 10vw);
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.25);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: none;
}
.p1-zone .joystick-thumb { background: rgba(0,212,255,0.2); border-color: rgba(0,212,255,0.4); }
.p2-zone .joystick-thumb { background: rgba(255,45,85,0.2); border-color: rgba(255,45,85,0.4); }

.joystick-label {
  position: absolute; bottom: 5%;
  color: rgba(255,255,255,0.2);
  font-size: min(11px, 2vw);
  pointer-events: none;
  letter-spacing: 1px;
  width: 50%; text-align: center;
}
.p1-zone .joystick-label { left: 0; color: rgba(0,212,255,0.3); }
.p2-zone .joystick-label { right: 0; color: rgba(255,45,85,0.3); }

/* Desktop hint */
#controls-hint {
  position: absolute; bottom: 8%;
  left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.15);
  font-size: min(11px, 2vw);
  text-align: center; pointer-events: none; letter-spacing: 1px;
  z-index: 5;
}
@media (max-width: 768px) {
  #controls-hint { display: none; }
}
@media (min-width: 769px) {
  .joystick-zone { display: none; }
}
</style>

<script>
// ═══════════════════════════════════════
//  AI Command Fighter — Phase 1 Engine
// ═══════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game world size (fixed)
const W = 900, H = 500;
canvas.width = W; canvas.height = H;

// Scale factor for touch coordinates
function getScale() {
  var rect = canvas.getBoundingClientRect();
  return { sx: W / rect.width, sy: H / rect.height, rect: rect };
}

// Game constants
const GRAVITY = 0.6;
const GROUND_Y = 400;
const FRICTION = 0.85;

// ═══════════════ Virtual Joystick ═══════════════
class VirtualJoystick {
  constructor(zoneId, visId, thumbId) {
    this.zone = document.getElementById(zoneId);
    this.visual = document.getElementById(visId);
    this.thumb = document.getElementById(thumbId);
    this.active = false;
    this.touchId = null;
    this.cx = 0; this.cy = 0;    // center of joystick
    this.dx = 0; this.dy = 0;    // normalized -1..1
    this.radius = 0;
    this._setup();
  }

  _setup() {
    this.zone.addEventListener('touchstart', (e) => {
      if (this.active) return;
      var t = e.changedTouches[0];
      this.touchId = t.identifier;
      this.active = true;
      var rect = this.zone.getBoundingClientRect();
      this.cx = t.clientX;
      this.cy = t.clientY;
      this.radius = Math.min(rect.width * 0.3, rect.height * 0.3, 70);
      this.visual.style.left = (this.cx - rect.left - this.visual.offsetWidth/2) + 'px';
      this.visual.style.top = (this.cy - rect.top - this.visual.offsetHeight/2) + 'px';
      this.visual.classList.add('active');
      this._updateThumb();
    }, { passive: false });

    this.zone.addEventListener('touchmove', (e) => {
      if (!this.active) return;
      for (var i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === this.touchId) {
          var t = e.changedTouches[i];
          var ndx = (t.clientX - this.cx) / this.radius;
          var ndy = (t.clientY - this.cy) / this.radius;
          var dist = Math.sqrt(ndx*ndx + ndy*ndy);
          if (dist > 1) { ndx /= dist; ndy /= dist; }
          this.dx = ndx;
          this.dy = ndy;
          this._updateThumb();
          break;
        }
      }
    }, { passive: false });

    this.zone.addEventListener('touchend', (e) => {
      for (var i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === this.touchId) {
          this.active = false;
          this.touchId = null;
          this.dx = 0; this.dy = 0;
          this.visual.classList.remove('active');
          this._updateThumb();
          break;
        }
      }
    }, { passive: false });

    this.zone.addEventListener('touchcancel', () => {
      this.active = false; this.touchId = null;
      this.dx = 0; this.dy = 0;
      this.visual.classList.remove('active');
      this._updateThumb();
    }, { passive: false });
  }

  _updateThumb() {
    var tx = this.dx * 50;
    var ty = this.dy * 50;
    this.thumb.style.transform = 'translate(calc(-50% + ' + tx + '%), calc(-50% + ' + ty + '%))';
  }
}

// ═══════════════ Pixel Art Sprites ═══════════════
const SPRITE_RYU = {

    '....64466446....','....11111111....','....111..111....','....111..111....',
    '....11111111....','.....1111.......','......11........','.....3333.......',
    '....3333333.....','.....33.33......','......3..3......','.....55555......',
    '.....33333......','......3..3......','......3..3......','......333.......',
  ],
  walk1: [
    '................','......6666......','.....666666.....','....66666666....',
    '....64466446....','....11111111....','....111..111....','....111..111....',
    '....11111111....','.....1111.......','......11........','.....3333.......',
    '....3333333.....','.....33.33......','......33.3......','.....55555......',
    '.....33333......','......3...3.....','......3...3.....','.....33..33.....',
  ],
  walk2: [
    '................','......6666......','.....666666.....','....66666666....',
    '....64466446....','....11111111....','....111..111....','....111..111....',
    '....11111111....','.....1111.......','......11........','.....3333.......',

  ],
  jump: [
    '................','......6666......','.....666666.....','....66666666....',
    '....64466446....','....11111111....','....111..111....','....111..111....',
    '....11111111....','.....1111.......','......11........','.....3333.......',
    '....3333333.....','.....33.33......','......3..3......','.....55555......',

    '................','......6666......','.....666666.....','....66666666....',
    '....64466446....','....11111111....','....111..111....','....111..111....',
    '....11111111....','.....1111.......','......11........','....333333......',
    '....3333333.....','....33.33.3.....','....3..3..3.....','....555555......',
    '....333333......','....3....3......','....3....3......','...33....33.....',
  ],
};

const SPRITE_KAGE = {
  idle: [
    '................','......2222......','.....224422.....','....22444422....',
    '....22444422....','....22....22....','....22.11.22....','....22.11.22....',
    '....22....22....','.....222222.....','......2222......','.....222222.....',
    '....22222222....','....22.22.22....','.....2.22.2.....','.....222222.....',
    '....22444422....','.....22.22......','.....22.22......','.....22222......',
  ],
  walk1: [
    '................','......2222......','.....224422.....','....22444422....',
    '....22444422....','....22....22....','....22.11.22....','....22.11.22....',
    '....22....22....','.....222222.....','......2222......','.....222222.....',
    '....22222222....','....22.22.22....','.....22.22.2....','.....222222.....',
    '....22444422....','.....22..22.....','.....22..22.....','....22...22.....',
  ],
  walk2: [
    '................','......2222......','.....224422.....','....22444422....',
    '....22444422....','....22....22....','....22.11.22....','....22.11.22....',
    '....22....22....','.....222222.....','......2222......','.....222222.....',
    '....22222222....','.....2.22.22....','....22.22.2.....','.....222222.....',
    '....22444422....','.....22..22.....','.....22..22.....','.....22..22.....',
  ],
  jump: [
    '................','......2222......','.....224422.....','....22444422....',

const PALETTES = {
  ryu: ['transparent', '#f4c59a', '#1a1a2e', '#ff6b35', '#ff2d55', '#f0f0f0', '#1a1a2e'],
  kage: ['transparent', '#ff2d55', '#1a0a2e', '#2d1b4e', '#ff4444', '#4a2d6e', '#1a0a2e'],
};

// ═══════════════ Fighter Class ═══════════════
class Fighter {
  constructor(name, spriteData, palette, x, facingRight) {
    this.name = name;
    this.spriteData = spriteData;
    this.palette = palette;
    this.x = x;
    this.y = GROUND_Y;
    this.vx = 0; this.vy = 0;
    this.width = 64; this.height = 80;
    this.facingRight = facingRight;
    this.state = 'idle';
    this.animFrame = 0; this.animSpeed = 8;
    this.onGround = true;
    this.hp = 100; this.maxHp = 100;
    this.speed = 3; this.jumpPower = -12;
    this.spriteCanvas = document.createElement('canvas');
    this.spriteCanvas.width = 64; this.spriteCanvas.height = 80;
    this.spriteCtx = this.spriteCanvas.getContext('2d');
    this.spriteCtx.imageSmoothingEnabled = false;
  }

  getSprite(state) {
    var sprites = this.spriteData[state] || this.spriteData.idle;
    if (state === 'walk') {
      return (Math.floor(this.animFrame / this.animSpeed) % 2 === 0) ? sprites.walk1 : sprites.walk2;
    }
    return sprites.idle;
  }

  update(keys, leftKey, rightKey, upKey, downKey) {
    // Keyboard input
    if (keys[leftKey])  { this.vx = -this.speed; this.facingRight = false; this.state = 'walk'; }
    else if (keys[rightKey]) { this.vx = this.speed; this.facingRight = true; this.state = 'walk'; }
    else { this.vx *= FRICTION; if (Math.abs(this.vx) < 0.1) this.vx = 0; }

    if (keys[upKey] && this.onGround) {
      this.vy = this.jumpPower; this.onGround = false; this.state = 'jump';
    }
    if (keys[downKey] && this.onGround) {
      this.state = 'crouch'; this.vx *= 0.5;
    } else if (this.onGround && Math.abs(this.vx) < 0.1) {
      this.state = 'idle';
    }
    if (!this.onGround) this.state = 'jump';

    // Physics
    this.vy += GRAVITY;
    this.x += this.vx; this.y += this.vy;
    if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; this.onGround = true; }
    if (this.x < 30) this.x = 30;
    if (this.x > W - 30 - this.width) this.x = W - 30 - this.width;
    this.animFrame++;
  }

  // Touch input (joystick axis)
  updateTouch(dx, dy) {
    if (Math.abs(dx) > 0.2 || Math.abs(dy) > 0.2) {
      // Horizontal
      if (dx < -0.2) { this.vx = -this.speed * Math.abs(dx); this.facingRight = false; this.state = 'walk'; }
      else if (dx > 0.2) { this.vx = this.speed * Math.abs(dx); this.facingRight = true; this.state = 'walk'; }
      else { this.vx *= FRICTION; if (Math.abs(this.vx) < 0.1) this.vx = 0; }

      // Vertical
      if (dy < -0.3 && this.onGround) {
        this.vy = this.jumpPower; this.onGround = false; this.state = 'jump';
      }
      if (dy > 0.3 && this.onGround) {
        this.state = 'crouch'; this.vx *= 0.5;
      } else if (this.onGround && Math.abs(this.vx) < 0.1 && Math.abs(dy) < 0.3) {
        this.state = 'idle';
      }
      if (!this.onGround) this.state = 'jump';
    } else {
      // Released - stop
      this.vx *= FRICTION;
      if (Math.abs(this.vx) < 0.1) this.vx = 0;
      if (this.onGround && Math.abs(this.vx) < 0.1) this.state = 'idle';
    }

    // Physics (same)
    this.vy += GRAVITY;
    this.x += this.vx; this.y += this.vy;
    if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; this.onGround = true; }
    if (this.x < 30) this.x = 30;
    if (this.x > W - 30 - this.width) this.x = W - 30 - this.width;
    this.animFrame++;
  }

  renderSprite(state) {
    var sc = this.spriteCtx;
    sc.clearRect(0, 0, 64, 80);
    var sprite = this.getSprite(state);
    for (var row = 0; row < sprite.length; row++) {
      for (var col = 0; col < sprite[row].length; col++) {
        var c = sprite[row][col];
        if (c === '.') continue;
        var idx = parseInt(c);
        if (isNaN(idx) || idx === 0) continue;
        sc.fillStyle = this.palette[idx];
        sc.fillRect(col * 4, row * 4, 4, 4);
      }
    }
  }

  draw(ctx) {
    this.renderSprite(this.state);
    ctx.save();
    var dx = this.facingRight ? this.x : this.x + this.width;
    var sx = this.facingRight ? 1 : -1;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(this.x + this.width/2, GROUND_Y + 70, 22, 6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.translate(dx, this.y - 16);
    ctx.scale(sx, 1);
    ctx.drawImage(this.spriteCanvas, 0, 0);
    ctx.restore();
  }

  getHitbox() {
    return { x: this.x + 8, y: this.y - 16 + 8, w: this.width - 16, h: this.height - 16 };
  }
}

// ═══════════════ Arena ═══════════════
function drawArena() {
  var skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#0a0a1a'); skyGrad.addColorStop(0.5, '#111133'); skyGrad.addColorStop(1, '#1a1040');
  ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, GROUND_Y);
  ctx.fillStyle = '#fff';
  for (var i = 0; i < 60; i++) {
    var sx = (i * 137 + 50) % W, sy = (i * 97 + 30) % (GROUND_Y - 50);
    var size = (i % 3 === 0) ? 1.5 : 0.7;
    var alpha = 0.3 + Math.sin(Date.now()/2000 + i) * 0.3;
    ctx.globalAlpha = alpha; ctx.fillRect(sx, sy, size, size);
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#ffeedd'; ctx.beginPath(); ctx.arc(750, 80, 35, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0a1a'; ctx.beginPath(); ctx.arc(765, 72, 30, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0d0d25';
  for (var i = 0; i < 20; i++) { var bx = i * 48, bh = 40 + Math.sin(i*1.7)*20; ctx.fillRect(bx, GROUND_Y - bh, 44, bh); }
  var groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  groundGrad.addColorStop(0, '#1a1a3e'); groundGrad.addColorStop(0.1, '#141430'); groundGrad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = groundGrad; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = 'rgba(0, 212, 255, 0.3)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(20, GROUND_Y); ctx.lineTo(W - 20, GROUND_Y); ctx.stroke();
  var corners = [[30,30],[W-30,30],[30,H-30],[W-30,H-30]];
  corners.forEach(function(c) {
    ctx.strokeStyle = 'rgba(255, 45, 85, 0.15)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(c[0]-15, c[1]); ctx.lineTo(c[0]+5, c[1]);
    ctx.moveTo(c[0], c[1]-15); ctx.lineTo(c[0], c[1]+5);
    ctx.stroke();
  });
  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  for (var i = 0; i < 12; i++) {
    var px = (i * 173 + Date.now()/50) % W, py = (i * 89 + 30) % GROUND_Y;
    ctx.fillRect(px, py, 2, 2);
  }
}

function drawPortrait(canvasId, spriteData, palette) {
  var pc = document.getElementById(canvasId);
  var pctx = pc.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  pctx.clearRect(0, 0, 48, 48);
  var sprite = spriteData.idle;
  for (var row = 0; row < Math.min(sprite.length, 12); row++) {
    for (var col = 0; col < Math.min(sprite[row].length, 12); col++) {
      var c = sprite[row][col];
      if (c === '.') continue;
      var idx = parseInt(c);
      if (isNaN(idx) || idx === 0) continue;
      pctx.fillStyle = palette[idx];
      pctx.fillRect(col * 4, row * 4, 4, 4);
    }
  }
}

// ═══════════════ Game Setup ═══════════════
var player1 = new Fighter('龍', SPRITE_RYU, PALETTES.ryu, 180, true);
var player2 = new Fighter('影', SPRITE_KAGE, PALETTES.kage, 620, false);
var keys = {};
var isMobile = window.innerWidth <= 768;

// Virtual joysticks (mobile only)
var joy1 = new VirtualJoystick('zoneP1', 'joyVisP1', 'joyThumbP1');
var joy2 = new VirtualJoystick('zoneP2', 'joyVisP2', 'joyThumbP2');

// Keyboard
window.addEventListener('keydown', function(e) { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
window.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; e.preventDefault(); });

// Resize handler
window.addEventListener('resize', function() { isMobile = window.innerWidth <= 768; });

// Draw portraits
drawPortrait('portrait1', SPRITE_RYU, PALETTES.ryu);
drawPortrait('portrait2', SPRITE_KAGE, PALETTES.kage);

// ═══════════════ Game Loop ═══════════════
function gameLoop() {
  // Update based on platform
  if (isMobile) {
    // Touch joystick mode
    if (joy1.active) player1.updateTouch(joy1.dx, joy1.dy);
    else player1.updateTouch(0, 0);
    if (joy2.active) player2.updateTouch(joy2.dx, joy2.dy);
    else player2.updateTouch(0, 0);
  } else {
    // Keyboard mode
    player1.update(keys, 'a', 'd', 'w', 's');
    player2.update(keys, 'arrowleft', 'arrowright', 'arrowup', 'arrowdown');
  }

  // Collision push
  var hb1 = player1.getHitbox(), hb2 = player2.getHitbox();
  if (hb1.x + hb1.w > hb2.x && hb1.x < hb2.x + hb2.w &&
      hb1.y + hb1.h > hb2.y && hb1.y < hb2.y + hb2.h) {
    var overlapX = Math.min(hb1.x + hb1.w - hb2.x, hb2.x + hb2.w - hb1.x);
    if (hb1.x < hb2.x) { player1.x -= overlapX/2; player2.x += overlapX/2; }
    else { player1.x += overlapX/2; player2.x -= overlapX/2; }
  }

  // Render
  ctx.clearRect(0, 0, W, H);
  drawArena();
  player1.draw(ctx);
  player2.draw(ctx);

  document.getElementById('hp1').style.width = (player1.hp / player1.maxHp * 100) + '%';
  document.getElementById('hp2').style.width = (player2.hp / player2.maxHp * 100) + '%';

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
