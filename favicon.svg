  <path d="M 380 70 Q 415 70 415 115 Q 415 190 345 215 Q 270 242 270 295 Q 270 365 340 390 Q 390 405 390 450 Q 390 490 350 490 L 162 490 Q 122 490 122 450 Q 122 375 192 350 Q 270 320 270 265 Q 270 195 195 170 Q 145 155 145 110 Q 145 70 180 70 Z" 
        fill="url(#sMain)"/>

  <!-- Highlight layer -->
