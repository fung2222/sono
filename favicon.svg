<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="40%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0a0a1a"/>
  <!-- Glowing ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.6"/>
  <!-- Sun corona dots -->
  <circle cx="50" cy="12" r="3" fill="#ff6b9d" opacity="0.8"/>
  <circle cx="78" cy="22" r="2.5" fill="#a29bfe" opacity="0.7"/>
  <circle cx="88" cy="50" r="3" fill="#6c5ce7" opacity="0.8"/>
  <circle cx="78" cy="78" r="2.5" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="50" cy="88" r="2" fill="#a29bfe" opacity="0.6"/>
  <circle cx="22" cy="78" r="3" fill="#6c5ce7" opacity="0.7"/>
  <circle cx="12" cy="50" r="2.5" fill="#ff6b9d" opacity="0.8"/>
  <circle cx="22" cy="22" r="2" fill="#a29bfe" opacity="0.6"/>
  <!-- Stylized S -->
  <text x="50" y="63" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-weight="900" font-size="46" fill="url(#grad)" filter="url(#glow)" letter-spacing="0">S</text>
  <!-- Inner glow dot -->
  <circle cx="50" cy="50" r="12" fill="url(#grad)" opacity="0.12"/>
</svg>
