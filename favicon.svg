      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="40%" stop-color="#f25a8a"/>
      <stop offset="100%" stop-color="#c44569"/>
    </linearGradient>
    <linearGradient id="sHighlight" x1="20%" y1="10%" x2="80%" y2="90%">
