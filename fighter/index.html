<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stickman Fighter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans HK", sans-serif;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
    color: #fff; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 10px; overflow: hidden fixed;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; user-select: none;
  }
  h1 {
    font-size: 1.7em; margin-bottom: 4px;
    background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #a29bfe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 3px; text-align: center; width: 100%;
  }
  .subtitle { color: #888; margin-bottom: 8px; font-size: 0.8em; text-align: center; width: 100%; }

  .top-bar {
    display: flex; justify-content: space-between; align-items: stretch;
    width: 100%; max-width: 640px; margin-bottom: 4px; gap: 6px;
  }
  .hp-score-col { flex: 1; display: flex; flex-direction: column; gap: 4px; }

  .hp-container {
    background: rgba(30,30,50,0.85); border-radius: 10px;
    padding: 6px 10px; border: 1px solid #333; backdrop-filter: blur(4px);
    display: flex; align-items: center; gap: 10px;
  }
  .hp-avatar { font-size: 1.6em; flex-shrink: 0; }
  .hp-info { flex: 1; }
  .hp-header { display: flex; justify-content: space-between; font-size: 0.78em; font-weight: 600; margin-bottom: 2px; }
  .hp-bar { height: 14px; background: #222; border-radius: 7px; overflow: hidden; }
  .hp-fill {
    height: 100%; border-radius: 7px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 8px rgba(255,107,107,0.5);
  }
  .p1 .hp-fill { background: linear-gradient(90deg, #ff6b6b, #feca57); }
  .p2 .hp-fill { background: linear-gradient(90deg, #48dbfb, #a29bfe); box-shadow: 0 0 8px rgba(72,219,251,0.5); }
  .charge-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .charge-bar { flex: 1; height: 5px; background: #222; border-radius: 3px; overflow: hidden; }
  .charge-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .p1 .charge-fill { background: linear-gradient(90deg, #feca57, #ff6b6b); }
  .p2 .charge-fill { background: linear-gradient(90deg, #48dbfb, #a29bfe); }
  .charge-txt { font-size: 0.65em; color: #feca57; white-space: nowrap; }

  .score-inline {
    display: flex; gap: 8px; font-size: 0.65em; color: #aaa;
    margin-top: 3px;
  }
  .score-inline b.s-win { color: #feca57; font-size: 1.1em; }
  .score-inline b.s-loss { color: #ff6b6b; font-size: 1.1em; }
  .p2 .score-inline b.s-win { color: #48dbfb; }
  .p2 .score-inline b.s-loss { color: #ff7675; }

  #arena {
    background: linear-gradient(180deg, #0f1419 0%, #1a1a2e 100%);
    border: 2px solid #333; border-radius: 12px;
    box-shadow: 0 0 40px rgba(255,107,107,0.12);
    margin-bottom: 2px; max-width: 100%; height: auto; display: block;
  }

  .gamepad {
    display: flex; justify-content: space-between; align-items: stretch;
    max-width: 640px; width: 100%; gap: 6px; margin-bottom: 4px;
    min-height: 180px; margin-top: 0;
  }

  /* Joystick */
  .joystick-zone {
    width: 140px; height: 140px; position: relative; flex-shrink: 0;
    background: rgba(30,30,50,0.6); border-radius: 50%;
    border: 2px solid #333;
  }
  .joystick-zone canvas { width: 100%; height: 100%; display: block; }
  .joystick-label {
    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
    font-size: 0.7em; color: #666; white-space: nowrap;
  }

  /* PS-style buttons - diamond layout */
  .ps-buttons {
    display: grid;
    grid-template-areas:
      ". tri ."
      "sq . cir"
      ". cross .";
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 2px; align-items: center; justify-items: center;
  }

  .ps-btn {
    width: 56px; height: 56px; border: none;
    color: #fff; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; touch-action: none;
    transition: transform 0.08s, filter 0.08s;
    position: relative; font-size: 1.6em;
  }
  .ps-btn:active, .ps-btn.active {
    transform: scale(0.88); filter: brightness(1.4);
    box-shadow: 0 0 20px currentColor;
  }
  .ps-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: none; box-shadow: none; }

  .ps-btn.square {
    grid-area: sq;
    background: #e056a0; border-radius: 6px;
    box-shadow: 0 3px 10px rgba(224,86,160,0.4);
  }
  .ps-btn.cross {
    grid-area: cross;
    background: #3498db; border-radius: 6px;
    box-shadow: 0 3px 10px rgba(52,152,219,0.4);
  }
  .ps-btn.circle {
    grid-area: cir;
    background: #e74c3c; border-radius: 50%;
    box-shadow: 0 3px 10px rgba(231,76,60,0.4);
  }
  .ps-btn.triangle {
    grid-area: tri;
    background: #2ecc71; border-radius: 6px;
    box-shadow: 0 3px 10px rgba(46,204,113,0.4);
  }
  .ps-btn.triangle.ready {
    animation: ultGlow 1s infinite;
    box-shadow: 0 3px 25px rgba(46,204,113,1), 0 0 35px rgba(255,255,255,0.4);
  }
  @keyframes ultGlow {
    0%, 100% { box-shadow: 0 3px 20px rgba(46,204,113,0.6); }
    50% { box-shadow: 0 3px 40px rgba(46,204,113,1), 0 0 50px rgba(255,255,255,0.5); }
  }

  /* PS button labels */
  .ps-legend {
    margin-top: 6px; display: grid;
    grid-template-columns: 1fr 1fr; gap: 2px 8px;
    font-size: 0.6em; color: #888; max-width: 170px;
  }
  .ps-legend span { display: flex; align-items: center; gap: 4px; }
  .ps-legend .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .ps-legend .dot.sq { background: #e056a0; border-radius: 2px; }
  .ps-legend .dot.cr { background: #e74c3c; border-radius: 50%; }
  .ps-legend .dot.tri { background: #2ecc71; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  .ps-legend .dot.cross-dot { background: #3498db; border-radius: 2px; }

  /* Restart button above log */
  .restart-bar {
    max-width: 640px; width: 100%; display: flex; justify-content: center; margin-bottom: 4px;
  }
  .btn-restart {
    padding: 8px 20px;
    background: linear-gradient(135deg, #ff6b6b, #feca57);
    border: none; color: #fff; border-radius: 8px;
    cursor: pointer; font-weight: 700; font-size: 0.85em;
    box-shadow: 0 2px 8px rgba(255,107,107,0.3);
    transition: transform 0.1s;
  }
  .btn-restart:active { transform: scale(0.95); }

  .log {
    max-width: 640px; width: 100%;
    background: rgba(15,20,25,0.9);
    border: 1px solid #333; border-radius: 10px;
    padding: 8px 10px; max-height: 110px; overflow-y: auto;
    font-size: 0.8em; line-height: 1.5;
  }
  .log-entry { margin-bottom: 3px; }
  .log-player { color: #feca57; }
  .log-ai { color: #48dbfb; }
  .log-system { color: #888; font-style: italic; }

  /* Death overlay */
  #deathOverlay {
    position: absolute; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s; z-index: 10;
    left: 0; top: 0; width: 100%; height: 100%;
  }
  #deathOverlay.show { opacity: 1; }
  #deathText {
    font-size: 2.2em; font-weight: 900; text-align: center;
    text-shadow: 0 0 30px currentColor, 0 2px 8px rgba(0,0,0,0.8);
    animation: deathBounce 0.5s ease-out;
  }
  @keyframes deathBounce {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  #arenaWrap { position: relative; display: inline-block; margin-bottom: 10px; }

  @media (max-width: 480px) {
    .ps-buttons { grid-template-columns: repeat(3, 46px); grid-template-rows: repeat(3, 46px); }
    .ps-btn { width: 46px; height: 46px; }
    .ps-btn .icon { font-size: 1.2em; }
    .joystick-zone { width: 120px; height: 120px; }
    h1 { font-size: 1.4em; }
  }
</style>
</head>
<body>
  <h1>⚔️ STICKMAN FIGHTER</h1>

  <div class="top-bar">
    <!-- Player (Left) -->
    <div class="hp-score-col p1">
      <div class="hp-container">
        <div class="hp-avatar">👤</div>
        <div class="hp-info">
          <div class="hp-header"><span>你</span><span id="playerHp">200</span></div>
          <div class="hp-bar"><div class="hp-fill" id="playerHpFill" style="width:100%"></div></div>
          <div class="charge-row">
            <div class="charge-bar"><div class="charge-fill" id="playerChargeFill" style="width:0%"></div></div>
            <div class="charge-txt">⚡<span id="playerCharge">0</span>/3</div>
          </div>
          <div class="score-inline"><span>生還:<b class="s-win" id="playerWins">0</b></span> <span>死亡:<b class="s-loss" id="playerLosses">0</b></span></div>
        </div>
      </div>
    </div>
    <!-- Spacer -->
    <div style="width:4px;flex-shrink:0"></div>
    <!-- AI (Right) -->
    <div class="hp-score-col p2">
      <div class="hp-container">
        <div class="hp-info" style="text-align:right">
          <div class="hp-header"><span id="aiHp">200</span><span>AI</span></div>
          <div class="hp-bar"><div class="hp-fill" id="aiHpFill" style="width:100%"></div></div>
          <div class="charge-row" style="flex-direction:row-reverse">
            <div class="charge-bar"><div class="charge-fill" id="aiChargeFill" style="width:0%"></div></div>
            <div class="charge-txt"><span id="aiCharge">0</span>/3⚡</div>
          </div>
          <div class="score-inline" style="justify-content:flex-end"><span>生還:<b class="s-win" id="aiWins">0</b></span> <span>死亡:<b class="s-loss" id="aiLosses">0</b></span></div>
        </div>
        <div class="hp-avatar">🤖</div>
      </div>
    </div>
  </div>

  <div id="arenaWrap">
    <canvas id="arena" width="640" height="500"></canvas>
    <div id="deathOverlay"><div id="deathText"></div></div>
  </div>

  <div class="gamepad">
    <div class="joystick-zone" id="joystickZone">
      <canvas id="jsCanvas" width="140" height="140"></canvas>
      <div class="joystick-label">移動</div>
    </div>

    <div class="ps-buttons">
      <button class="ps-btn triangle" id="triBtn" data-action="ultimate">
        ▲
      </button>
      <button class="ps-btn square" data-action="slash">
        ■
      </button>
      <button class="ps-btn circle" data-action="ranged">
        ●
      </button>
      <button class="ps-btn cross" data-action="jump">
        ✕
      </button>
    </div>
  </div>

  <div class="restart-bar">
    <button class="btn-restart" id="restartBtn">重新開始</button>
  </div>

  <div class="log" id="log" style="display:none"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const GROUND_Y = 445;
const ARENA_W = 640;
const ARENA_H = 505;
const MOVE_SPEED = 5.5;
const JUMP_FORCE = -11;
const GRAVITY = 0.65;

// ============================================================
// TTS
// ============================================================
const VOICE_LINES = {
  player: { hit: '接住', die: '我頂唔住啦' },
  ai: { hit: '唔好', die: '我畀你屈死啦' },
};

function speak(text, character) {
  if (!text || !('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-HK'; u.rate = 1.0;
  u.pitch = character === 'ai' ? 0.82 : 1.15; u.volume = 1;
  speechSynthesis.speak(u);
}

// ============================================================
// GAME STATE
// ============================================================
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const logEl = document.getElementById('log');
const restartBtn = document.getElementById('restartBtn');
const triBtn = document.getElementById('triBtn');
const deathOverlay = document.getElementById('deathOverlay');
const deathText = document.getElementById('deathText');

let gameOver = false;
let projectiles = [];
let particles = [];
let animFrame = 0;
let screenShake = 0;
let slowMoFrames = 0;
let scores = { playerWins: 0, playerLosses: 0, aiWins: 0, aiLosses: 0 };
let dyingFighter = null;
let deathTimer = 0;
let logCache = []; // for in-canvas log

function createFighter(x, isAI) {
  return {
    hp: 200, maxHp: 200,
    x, y: GROUND_Y,
    vx: 0, vy: 0,
    facing: isAI ? -1 : 1,
    charge: 0, defending: false,
    pose: 'idle', poseTimer: 0, hitFlash: 0,
    isAI, color: isAI ? '#48dbfb' : '#feca57',
    targetPose: 'idle', animProgress: 1,
    aiThinkTimer: 20, aiMoveDir: 0, aiActionCooldown: 0,
    dead: false,
    speechText: '', speechTimer: 0,
    chargingUltimate: 0,
    aiMode: -1,
    jumpAngle: 0, // for flip rotation
  };
}

let player, ai;

function initGame() {
  player = createFighter(180, false);
  ai = createFighter(460, true);
  ai.aiMode = Math.floor(Math.random() * 3); // 0=aggressive, 1=kiter, 2=random
  gameOver = false;
  projectiles = [];
  particles = [];
  screenShake = 0;
  slowMoFrames = 0;
  deathTimer = 0;
  dyingFighter = null;
  deathOverlay.classList.remove('show');
  [player, ai].forEach(f => { f.speechText = ''; f.speechTimer = 0; f.chargingUltimate = 0; f.jumpAngle = 0; });
  const modeNames = ['埋身肉搏', '拉打遊擊', '隨機發揮'];
  logCache = [];
  logEl.innerHTML = '';
  addLog(`⚔️ 對戰開始！AI 模式：${modeNames[ai.aiMode]}`, 'system');
  updateUI();
  document.querySelectorAll('.ps-btn').forEach(b => b.disabled = false);
}

// Round rect helper (used by speech bubble)
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// DRAWING
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }

function getPosePoints(pose, facing) {
  const f = facing;
  const poses = {
    idle: {
      head: {x:0,y:-68}, neck:{x:0,y:-50}, hip:{x:0,y:-5},
      armL:{x:-24*f,y:-24}, armR:{x:24*f,y:-24},
      legL:{x:-15,y:52}, legR:{x:15,y:52},
    },
    slash: {
      head:{x:5*f,y:-65}, neck:{x:3*f,y:-47}, hip:{x:0,y:-5},
      armL:{x:-16*f,y:-26}, armR:{x:48*f,y:-40},
      legL:{x:-20,y:52}, legR:{x:22*f,y:50},
    },
    ranged: {
      head:{x:3*f,y:-68}, neck:{x:2*f,y:-50}, hip:{x:0,y:-5},
      armL:{x:-14*f,y:-32}, armR:{x:44*f,y:-35},
      legL:{x:-14,y:52}, legR:{x:14,y:52},
    },
    defend: {
      head:{x:-4*f,y:-60}, neck:{x:-2*f,y:-44}, hip:{x:0,y:-2},
      armL:{x:12*f,y:-44}, armR:{x:16*f,y:-37},
      legL:{x:-20,y:50}, legR:{x:14,y:52},
    },
    ultimate: {
      head:{x:0,y:-75}, neck:{x:0,y:-55}, hip:{x:0,y:-10},
      armL:{x:-42*f,y:-65}, armR:{x:42*f,y:-65},
      legL:{x:-28,y:48}, legR:{x:28,y:48},
    },
    hit: {
      head:{x:-6*f,y:-60}, neck:{x:-3*f,y:-44}, hip:{x:-2*f,y:-3},
      armL:{x:-22*f,y:-10}, armR:{x:-10*f,y:3},
      legL:{x:-10,y:52}, legR:{x:18,y:50},
    },
    jump: {
      head:{x:0,y:-68}, neck:{x:0,y:-50}, hip:{x:0,y:-5},
      armL:{x:-28*f,y:-42}, armR:{x:28*f,y:-42},
      legL:{x:-12,y:38}, legR:{x:12,y:38},
    },
    dead: {
      head:{x:-10*f,y:-15}, neck:{x:-4*f,y:-2}, hip:{x:0,y:12},
      armL:{x:-35*f,y:15}, armR:{x:-10*f,y:5},
      legL:{x:-30,y:35}, legR:{x:-5,y:30},
    },
    sit: {
      head:{x:0,y:-35}, neck:{x:0,y:-20}, hip:{x:0,y:5},
      armL:{x:-30*f,y:0}, armR:{x:30*f,y:0},
      legL:{x:-40,y:30}, legR:{x:40,y:30},
    },
  };
  return poses[pose] || poses.idle;
}

function interpolatePoints(a, b, t) {
  const r = {};
  for (const k of Object.keys(a)) r[k] = {x: lerp(a[k].x,b[k].x,t), y: lerp(a[k].y,b[k].y,t)};
  return r;
}

function drawLimb(x1,y1,x2,y2,bendDir,isLeg=false) {
  const mx = (x1+x2)/2 + bendDir, my = (y1+y2)/2 + (isLeg?-3:5);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(mx,my,x2,y2); ctx.stroke();
}

function drawStickman(fighter) {
  const {x, y:baseY, color, facing, charge, defending, hitFlash, dead, speechText, speechTimer, chargingUltimate, jumpAngle} = fighter;
  let y = baseY;
  if (dead) y = GROUND_Y + 25;

  // Speech bubble
  if (speechTimer > 0 && speechText) {
    const bx = x, by = (dead ? y - 170 : y - 120);
    ctx.save();
    ctx.font = 'bold 24px "Noto Sans HK", sans-serif';
    const metrics = ctx.measureText(speechText);
    const tw = metrics.width + 28, th = 42;
    const rx = bx - tw/2, ry = by - th;
    // Bubble bg
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    roundRect(ctx, rx, ry, tw, th, 8);
    ctx.fill();
    ctx.stroke();
    // Tail
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.beginPath();
    ctx.moveTo(bx - 6, ry + th);
    ctx.lineTo(bx, ry + th + 10);
    ctx.lineTo(bx + 6, ry + th);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(bx - 6, ry + th);
    ctx.lineTo(bx, ry + th + 10);
    ctx.lineTo(bx + 6, ry + th);
    ctx.stroke();
    // Text
    ctx.fillStyle = '#feca57';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(speechText, bx, ry + th/2);
    ctx.restore();
  }

  const t = Math.min(1, fighter.animProgress);
  const eased = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
  const fromP = getPosePoints(fighter.pose, facing);
  const toP = getPosePoints(fighter.targetPose, facing);
  const pts = interpolatePoints(fromP, toP, eased);

  ctx.save();
  let dc = color;
  if (hitFlash > 0) dc = hitFlash%4<2 ? '#fff' : '#ff4444';
  ctx.strokeStyle = dc; ctx.fillStyle = dc;
  ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x, GROUND_Y+52, 22, 6, 0, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = dc; ctx.fillStyle = dc;

  // Jump flip rotation
  if (jumpAngle > 0) {
    ctx.translate(x, y - 15);
    ctx.rotate(jumpAngle);
    ctx.translate(-x, -(y - 15));
  }

  // Head
  ctx.beginPath(); ctx.arc(x+pts.head.x, y+pts.head.y, 15, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+pts.head.x+6*facing, y+pts.head.y-2, 2.5, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.beginPath(); ctx.moveTo(x+pts.neck.x, y+pts.neck.y); ctx.lineTo(x+pts.hip.x, y+pts.hip.y); ctx.stroke();

  // Limbs
  drawLimb(x+pts.neck.x,y+pts.neck.y+5, x+pts.armL.x,y+pts.armL.y, -facing*5);
  drawLimb(x+pts.neck.x,y+pts.neck.y+5, x+pts.armR.x,y+pts.armR.y, facing*5);
  drawLimb(x+pts.hip.x,y+pts.hip.y, x+pts.legL.x,y+pts.legL.y, 0, true);
  drawLimb(x+pts.hip.x,y+pts.hip.y, x+pts.legR.x,y+pts.legR.y, 0, true);

  // Slash weapon
  if (fighter.targetPose==='slash' && eased>0.2) {
    const wx=x+pts.armR.x, wy=y+pts.armR.y;
    ctx.strokeStyle='#fff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx+35*facing, wy-20); ctx.stroke();
    ctx.strokeStyle='rgba(255,159,67,0.7)'; ctx.lineWidth=12;
    ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx+35*facing, wy-20); ctx.stroke();
    if (eased>0.3 && eased<0.8) {
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(wx,wy,42, -Math.PI*0.7*facing, Math.PI*0.3*facing, facing<0); ctx.stroke();
    }
  }

  // Ranged glow
  if (fighter.targetPose==='ranged' && eased>0.5) {
    const gx=x+pts.armR.x, gy=y+pts.armR.y;
    ctx.fillStyle='rgba(72,219,251,0.8)'; ctx.beginPath(); ctx.arc(gx,gy,12,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(72,219,251,0.3)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(gx,gy,18,0,Math.PI*2); ctx.stroke();
  }

  // Defend shield
  if (defending) {
    ctx.strokeStyle='rgba(254,202,87,0.8)'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(x+14*facing, y-18, 38, -Math.PI*0.7, Math.PI*0.7); ctx.stroke();
    ctx.fillStyle='rgba(254,202,87,0.12)';
    ctx.beginPath(); ctx.arc(x+14*facing, y-18, 38, -Math.PI*0.7, Math.PI*0.7); ctx.lineTo(x+14*facing, y-18); ctx.fill();
  }

  // Charge aura
  if (charge>=3) {
    const p = Math.sin(animFrame*0.1)*0.3+0.7;
    ctx.strokeStyle=`rgba(162,155,254,${p*0.6})`; ctx.lineWidth=2;
    for (let i=0; i<3; i++) {
      ctx.beginPath(); ctx.arc(x, y-15, 34+i*14+Math.sin(animFrame*0.05+i)*4, 0, Math.PI*2); ctx.stroke();
    }
  }

  // Super Saiyan mode (during ultimate charge)
  if (chargingUltimate > 0) {
    const ssjProgress = 1 - (chargingUltimate / 90); // 0→1 during charge
    const pulse = Math.sin(animFrame * 0.15) * 0.3 + 0.7;
    // Golden aura rings
    ctx.strokeStyle = `rgba(255, 234, 167, ${0.6 * pulse})`;
    ctx.lineWidth = 3;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.arc(x, y - 15, 40 + i * 14 + Math.sin(animFrame * 0.08 + i) * 6, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Energy pillar
    const pillarAlpha = 0.25 * pulse * ssjProgress;
    const pillarGrad = ctx.createLinearGradient(x, y - 120, x, y + 20);
    pillarGrad.addColorStop(0, `rgba(255,234,167,0)`);
    pillarGrad.addColorStop(0.3, `rgba(255,234,167,${pillarAlpha})`);
    pillarGrad.addColorStop(0.7, `rgba(255,234,167,${pillarAlpha})`);
    pillarGrad.addColorStop(1, `rgba(255,234,167,0)`);
    ctx.fillStyle = pillarGrad;
    ctx.fillRect(x - 30, y - 120, 60, 140);
    // Super saiyan hair (spiky triangles)
    const headX = x + pts.head.x;
    const headY = y + pts.head.y;
    ctx.fillStyle = `rgba(255, 215, 0, ${0.9 * ssjProgress})`;
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      const bx = headX + i * 10 + Math.sin(animFrame * 0.2 + i) * 3;
      const by = headY - 14;
      const spikeH = 18 + Math.abs(i) * 5 + Math.sin(animFrame * 0.25 + i) * 4;
      ctx.moveTo(bx - 4, by);
      ctx.lineTo(bx, by - spikeH);
      ctx.lineTo(bx + 4, by);
      ctx.fill();
    }
    // Hair glow
    ctx.strokeStyle = 'rgba(255,255,100,0.4)';
    ctx.lineWidth = 1;
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      const bx = headX + i * 10 + Math.sin(animFrame * 0.2 + i) * 3;
      const by = headY - 14;
      const spikeH = 18 + Math.abs(i) * 5 + Math.sin(animFrame * 0.25 + i) * 4;
      ctx.moveTo(bx - 4, by);
      ctx.lineTo(bx, by - spikeH);
      ctx.lineTo(bx + 4, by);
      ctx.stroke();
    }
    // White eyes (no pupil)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(headX + 6*facing, headY - 2, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// Particles
function spawnParticles(x, y, color, count, spread=1) {
  for (let i=0; i<count; i++) {
    particles.push({
      x, y, vx:(Math.random()-0.5)*10*spread, vy:(Math.random()-0.5)*10*spread-3,
      life:1, color, size:Math.random()*5+2, type:'normal',
    });
  }
}

function spawnUltimateParticles(x, y) {
  // Big explosion
  for (let i=0; i<80; i++) {
    const a = (Math.PI*2*i)/80;
    const s = Math.random()*18+5;
    particles.push({
      x,y:y-20, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1.6, color:['#a29bfe','#fff','#fd79a8','#ffeaa7','#00cec9'][Math.floor(Math.random()*5)],
      size:Math.random()*10+4, type:'ultimate',
    });
  }
  // Rings
  for (let r=0; r<4; r++) {
    for (let i=0; i<24; i++) {
      const a = (Math.PI*2*i)/24;
      const rad = 35+r*30;
      particles.push({
        x:x+Math.cos(a)*rad, y:y-20+Math.sin(a)*rad*0.5,
        vx:Math.cos(a)*4, vy:Math.sin(a)*4-3,
        life:1.3, color:'#a29bfe', size:4, type:'ultimate',
      });
    }
  }
}

function spawnDeathParticles(x, y) {
  for (let i=0; i<40; i++) {
    particles.push({
      x, y:y-10, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8-5,
      life:1.2, color:['#ff4444','#333','#fff'][Math.floor(Math.random()*3)],
      size:Math.random()*4+2, type:'death',
    });
  }
}

function drawParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.type==='ultimate' || p.type==='death' ? 0.1 : 0.25;
    p.life -= p.type==='ultimate' ? 0.018 : 0.03;
    if (p.life<=0) { particles.splice(i,1); continue; }
    ctx.globalAlpha = Math.min(1,p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*Math.min(1,p.life),0,Math.PI*2); ctx.fill();
    if ((p.type==='ultimate' || p.type==='death') && p.life>0.4) {
      ctx.globalAlpha = p.life*0.25;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*2.5,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// Projectiles (enhanced effects)
function spawnProjectile(x, y, dir, owner) {
  projectiles.push({x, y, vx:dir*10, owner, color:'#feca57', life:80});
}

function drawProjectiles() {
  for (let i=projectiles.length-1; i>=0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.life--;
    if (p.life<=0 || p.x<-20 || p.x>ARENA_W+20) { projectiles.splice(i,1); continue; }

    // Trail
    for (let t=0; t<4; t++) {
      ctx.globalAlpha = 0.15 - t*0.03;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x-p.vx*t*0.7, p.y, 6-t*1.2, 0, Math.PI*2); ctx.fill();
    }
    // Glow
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(254,202,87,0.3)';
    ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, Math.PI*2); ctx.fill();
    // Core
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 7, 0, Math.PI*2); ctx.fill();

    // Extra particles along path
    if (animFrame%3===0) {
      particles.push({x:p.x,y:p.y,vx:0,vy:0,life:0.4,color:p.color,size:3,type:'normal'});
    }

    const target = p.owner===player ? ai : player;
    if (!target.dead && Math.abs(p.x-target.x)<30 && Math.abs(p.y-(target.y-15))<50) {
      const dmg = target.defending ? 3 : 12+Math.floor(Math.random()*5);
      applyDamage(target, dmg, p.owner);
      spawnParticles(p.x, p.y, p.color, 12);
      projectiles.splice(i, 1);
    }
  }
}

// ============================================================
// COMBAT — No hit stun!
// ============================================================
function applyDamage(target, dmg, attacker, bigKnockback = false) {
  if (target.dead) return;
  target.hp = Math.max(0, target.hp - dmg);
  target.hitFlash = 6;
  target.defending = false;

  const dir = target===player ? -1 : 1;
  target.vx = dir * (bigKnockback ? 18 : 7);
  if (bigKnockback) target.vy = -6; // launch up

  // Minimal pose disruption — just flash, don't stop
  target.hitFlash = 8;

  if (attacker) attacker.charge = Math.min(3, attacker.charge+1);

  const char = target.isAI ? 'ai' : 'player';
  const charLabel = target.isAI ? '🤖' : '👤';

  if (target.hp <= 0) {
    // Death!
    speak(VOICE_LINES[char].die, char);
    addLog(`${charLabel}：「${VOICE_LINES[char].die}」`, char);
    killFighter(target);
  } else {
    speak(VOICE_LINES[char].hit, char);
    addLog(`${charLabel}：「${VOICE_LINES[char].hit}」(-${dmg})`, char);
  }

  spawnParticles(target.x, target.y-20, target.color, 10);
  updateUI();
}

function killFighter(fighter) {
  fighter.dead = true;
  fighter.hp = 0;
  dyingFighter = fighter;
  deathTimer = 90;

  const winner = fighter === player ? ai : player;

  // Speech bubbles
  fighter.speechText = fighter.isAI ? '我畀你屈死啦' : '我頂唔住啦';
  fighter.speechTimer = 90;
  winner.speechText = '垃圾';
  winner.speechTimer = 80;
  gameOver = true;

  // Death particles
  spawnDeathParticles(fighter.x, fighter.y);

  // Fall down pose
  fighter.pose = fighter.targetPose;
  fighter.targetPose = 'dead';
  fighter.animProgress = 0;
  fighter.y = GROUND_Y; // snap to ground

  // Center death text
  const winnerName = fighter === player ? 'AI' : '你';
  deathText.textContent = fighter === player ? '👤 你戰敗！' : '🤖 AI 戰敗！';
  deathText.style.color = fighter === player ? '#ff4444' : '#48dbfb';
  deathOverlay.classList.add('show');

  // Update scores
  if (fighter === player) {
    scores.playerLosses++;
    scores.aiWins++;
  } else {
    scores.playerWins++;
    scores.aiLosses++;
  }

  document.querySelectorAll('.ps-btn').forEach(b => b.disabled = true);
  updateUI();
}

function setPose(fighter, pose, duration) {
  fighter.pose = fighter.targetPose;
  fighter.targetPose = pose;
  fighter.animProgress = 0;
  fighter.poseTimer = duration;
}

function performAction(action, fighter) {
  if (gameOver || fighter.hp <= 0 || fighter.dead) return;
  if (fighter.chargingUltimate > 0) return; // can't act while charging

  const defender = fighter===player ? ai : player;
  const isPlayer = fighter===player;
  const dist = Math.abs(fighter.x - defender.x);

  if (action !== 'defend') fighter.defending = false;

  switch (action) {
    case 'slash': {
      setPose(fighter, 'slash', 16);
      if (dist < 95) {
        const dmg = defender.defending ? 4 : 16 + Math.floor(Math.random()*7);
        const label = isPlayer?'👤':'🤖';
        addLog(`${label} ■ 斬擊！`, isPlayer?'player':'ai');
        setTimeout(() => { if (!gameOver) applyDamage(defender, dmg, fighter); }, 100);
      } else {
        addLog(`${isPlayer?'👤':'🤖'} ■ 斬擊揮空！`, 'system');
      }
      fighter.charge = Math.min(3, fighter.charge+1);
      // Slash particles
      spawnParticles(fighter.x+20*fighter.facing, fighter.y-20, '#ff9f43', 8);
      break;
    }
    case 'ranged': {
      setPose(fighter, 'ranged', 16);
      setTimeout(() => { if (!gameOver) spawnProjectile(fighter.x+28*fighter.facing, fighter.y-32, fighter.facing, fighter); }, 160);
      addLog(`${isPlayer?'👤':'🤖'} ● 射擊！`, isPlayer?'player':'ai');
      fighter.charge = Math.min(3, fighter.charge+1);
      spawnParticles(fighter.x+28*fighter.facing, fighter.y-32, '#48dbfb', 5);
      break;
    }
    case 'jump': {
      if (fighter.y >= GROUND_Y-1) {
        fighter.vy = JUMP_FORCE;
        setPose(fighter, 'jump', 30);
        fighter.jumpAngle = 0.001;
        spawnParticles(fighter.x, GROUND_Y+45, '#55efc4', 10, 0.5);
      }
      break;
    }
    case 'defend': {
      fighter.defending = true;
      setPose(fighter, 'defend', 40);
      addLog(`${isPlayer?'👤':'🤖'} 🛡️ 防禦！`, isPlayer?'player':'ai');
      break;
    }
    case 'ultimate': {
      if (fighter.charge < 3) {
        addLog(`${isPlayer?'👤':'🤖'} ▲ 大招未儲滿！（${fighter.charge}/3）`, 'system');
        return;
      }
      if (fighter.chargingUltimate > 0) return; // already charging
      fighter.charge = 0;
      fighter.chargingUltimate = 90; // 1.5 seconds
      fighter.vx = 0; fighter.vy = 0;
      addLog(`${isPlayer?'👤':'🤖'} ▲ 儲氣中...`, isPlayer?'player':'ai');
      updateUI();
      break;
    }
  }
  updateUI();
}

// ============================================================
// AI
// ============================================================
function updateAI() {
  if (gameOver || ai.hp <= 0 || ai.dead) return;
  if (ai.chargingUltimate > 0) return;

  const dist = Math.abs(ai.x - player.x);
  const lowHP = ai.hp < 60; // < 30% of 200
  const mode = ai.aiMode;

  // Determine effective mode (mode 2 switches at low HP)
  let effectiveMode = mode;
  if (mode === 0 && lowHP) effectiveMode = 1; // aggressive → kite when low
  if (mode === 1 && lowHP) effectiveMode = 0; // kiter → aggressive when low
  // mode 2 (random) stays random

  // Movement strategy
  ai.aiThinkTimer--;
  if (ai.aiThinkTimer <= 0) {
    ai.aiThinkTimer = 12 + Math.floor(Math.random() * 20);

    if (effectiveMode === 0) {
      // Aggressive: chase down
      if (dist > 80) ai.aiMoveDir = ai.x < player.x ? 1 : -1;
      else if (dist < 40) ai.aiMoveDir = Math.random() < 0.2 ? (ai.x < player.x ? -1 : 1) : 0;
      else ai.aiMoveDir = Math.random() < 0.7 ? (ai.x < player.x ? 1 : -1) : 0;
    } else if (effectiveMode === 1) {
      // Kiter: keep distance, run away
      if (dist < 70) ai.aiMoveDir = ai.x < player.x ? -1 : 1; // run away
      else if (dist > 160) ai.aiMoveDir = ai.x < player.x ? 1 : -1; // approach slightly
      else ai.aiMoveDir = Math.random() < 0.3 ? (ai.x < player.x ? -1 : 1) : 0;
    } else {
      // Random (original behaviour)
      if (dist > 140) ai.aiMoveDir = ai.x < player.x ? 1 : -1;
      else if (dist < 50) ai.aiMoveDir = Math.random() < 0.35 ? (ai.x < player.x ? -1 : 1) : 0;
      else ai.aiMoveDir = Math.random() < 0.5 ? (ai.x < player.x ? 1 : -1) : 0;
    }

    if (Math.random() < 0.12 && ai.y >= GROUND_Y - 1) { ai.vy = JUMP_FORCE; setPose(ai, 'jump', 30); }
  }

  if (ai.aiMoveDir !== 0) {
    ai.vx += ai.aiMoveDir * (effectiveMode === 0 ? 2.0 : 1.5);
    if (Math.abs(ai.vx) > MOVE_SPEED * 0.8) ai.vx = ai.aiMoveDir * MOVE_SPEED * 0.8;
  }

  // Attack strategy
  ai.aiActionCooldown--;
  if (ai.aiActionCooldown <= 0) {
    const actions = [];

    if (effectiveMode === 0) {
      // Aggressive: melee focus
      if (ai.charge >= 3 && dist < 180 && Math.random() < 0.6) actions.push('ultimate');
      if (dist < 90) { actions.push('slash', 'slash', 'slash', 'slash'); }
      if (dist > 120) actions.push('ranged', 'slash');
      if (player.charge >= 3 && Math.random() < 0.3) actions.push('defend');
      actions.push('slash', 'defend');
    } else if (effectiveMode === 1) {
      // Kiter: ranged focus, keep distance
      if (ai.charge >= 3 && dist < 200 && Math.random() < 0.5) actions.push('ultimate');
      actions.push('ranged', 'ranged', 'ranged');
      if (dist < 80) actions.push('slash', 'defend', 'defend');
      if (player.charge >= 3 && Math.random() < 0.5) actions.push('defend', 'defend');
      actions.push('ranged');
    } else {
      // Random/balanced
      if (ai.charge >= 3 && dist < 200 && Math.random() < 0.5) actions.push('ultimate');
      if (dist < 95) { actions.push('slash', 'slash', 'slash', 'defend'); }
      if (dist > 100) actions.push('ranged', 'ranged', 'ranged');
      if (player.charge >= 3 && Math.random() < 0.4) actions.push('defend', 'defend');
      actions.push('ranged', 'slash');
    }

    const action = actions[Math.floor(Math.random() * actions.length)];
    performAction(action, ai);
    ai.aiActionCooldown = effectiveMode === 1 ? 18 : 22 + Math.floor(Math.random() * 30);
  }
}

// ============================================================
// JOYSTICK
// ============================================================
let joystickActive = false;
let joystickId = null;
let jsDir = {x:0, y:0};
const jsCanvas = document.getElementById('jsCanvas');
const jsCtx = jsCanvas.getContext('2d');
const jsZone = document.getElementById('joystickZone');
const jsCX = 70, jsCY = 70, jsR = 50;
let jsKnobX = jsCX, jsKnobY = jsCY;

function drawJoystick() {
  jsCtx.clearRect(0,0,140,140);
  // Outer ring
  jsCtx.strokeStyle = '#555'; jsCtx.lineWidth = 2;
  jsCtx.beginPath(); jsCtx.arc(jsCX, jsCY, jsR, 0, Math.PI*2); jsCtx.stroke();
  jsCtx.strokeStyle = '#333'; jsCtx.lineWidth = 1;
  jsCtx.beginPath(); jsCtx.arc(jsCX, jsCY, jsR-4, 0, Math.PI*2); jsCtx.stroke();
  // Knob
  const grad = jsCtx.createRadialGradient(jsKnobX,jsKnobY,2, jsKnobX,jsKnobY,22);
  grad.addColorStop(0, '#feca57'); grad.addColorStop(1, '#d63031');
  jsCtx.fillStyle = grad;
  jsCtx.beginPath(); jsCtx.arc(jsKnobX, jsKnobY, 22, 0, Math.PI*2); jsCtx.fill();
  jsCtx.strokeStyle = '#fff'; jsCtx.lineWidth = 2;
  jsCtx.stroke();
}

function getJoystickDir(e) {
  const rect = jsZone.getBoundingClientRect();
  const scaleX = 140 / rect.width;
  const scaleY = 140 / rect.height;
  let cx, cy;
  if (e.touches) {
    cx = (e.touches[0].clientX - rect.left) * scaleX;
    cy = (e.touches[0].clientY - rect.top) * scaleY;
  } else {
    cx = (e.clientX - rect.left) * scaleX;
    cy = (e.clientY - rect.top) * scaleY;
  }
  const dx = cx - jsCX, dy = cy - jsCY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > jsR) {
    return {x: dx/dist, y: dy/dist, dist: jsR};
  }
  return {x: dist>5 ? dx/jsR : 0, y: dist>5 ? dy/jsR : 0, dist: Math.min(dist, jsR)};
}

jsZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  joystickActive = true;
  joystickId = e.changedTouches[0].identifier;
  const d = getJoystickDir(e);
  jsDir = d;
  jsKnobX = jsCX + d.x*d.dist; jsKnobY = jsCY + d.y*d.dist;
  drawJoystick();
}, {passive: false});

jsZone.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!joystickActive) return;
  for (let t of e.changedTouches) {
    if (t.identifier === joystickId) {
      const d = getJoystickDir({touches: [t]});
      jsDir = d;
      jsKnobX = jsCX + d.x*d.dist; jsKnobY = jsCY + d.y*d.dist;
      drawJoystick();
      break;
    }
  }
}, {passive: false});

jsZone.addEventListener('touchend', (e) => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    if (t.identifier === joystickId) {
      joystickActive = false;
      jsDir = {x:0, y:0};
      jsKnobX = jsCX; jsKnobY = jsCY;
      drawJoystick();
      break;
    }
  }
}, {passive: false});

jsZone.addEventListener('touchcancel', () => {
  joystickActive = false;
  jsDir = {x:0, y:0};
  jsKnobX = jsCX; jsKnobY = jsCY;
  drawJoystick();
});

// Mouse joystick
jsZone.addEventListener('mousedown', (e) => {
  joystickActive = true;
  const d = getJoystickDir(e);
  jsDir = d;
  jsKnobX = jsCX + d.x*d.dist; jsKnobY = jsCY + d.y*d.dist;
  drawJoystick();
});
jsZone.addEventListener('mousemove', (e) => {
  if (!joystickActive) return;
  const d = getJoystickDir(e);
  jsDir = d;
  jsKnobX = jsCX + d.x*d.dist; jsKnobY = jsCY + d.y*d.dist;
  drawJoystick();
});
jsZone.addEventListener('mouseup', () => {
  joystickActive = false;
  jsDir = {x:0, y:0};
  jsKnobX = jsCX; jsKnobY = jsCY;
  drawJoystick();
});
jsZone.addEventListener('mouseleave', () => {
  joystickActive = false;
  jsDir = {x:0, y:0};
  jsKnobX = jsCX; jsKnobY = jsCY;
  drawJoystick();
});

drawJoystick();

// Joystick dir to movement each frame
function processJoystick() {
  if (gameOver || player.hp <= 0 || player.dead || player.chargingUltimate > 0) return;
  if (!joystickActive) return;
  player.vx = jsDir.x * MOVE_SPEED;
  if (jsDir.y < -0.3 && player.y >= GROUND_Y-1) {
    moveFighter(player, 'jump');
  }
}

// ============================================================
// UI
// ============================================================
function updateUI() {
  document.getElementById('playerHp').textContent = Math.max(0, player.hp);
  document.getElementById('aiHp').textContent = Math.max(0, ai.hp);
  document.getElementById('playerHpFill').style.width = Math.max(0, player.hp)+'%';
  document.getElementById('aiHpFill').style.width = Math.max(0, ai.hp)+'%';
  document.getElementById('playerCharge').textContent = player.charge;
  document.getElementById('aiCharge').textContent = ai.charge;
  document.getElementById('playerChargeFill').style.width = (player.charge/3*100)+'%';
  document.getElementById('aiChargeFill').style.width = (ai.charge/3*100)+'%';
  document.getElementById('playerWins').textContent = scores.playerWins;
  document.getElementById('playerLosses').textContent = scores.playerLosses;
  document.getElementById('aiWins').textContent = scores.aiWins;
  document.getElementById('aiLosses').textContent = scores.aiLosses;

  if (player.charge >= 3 && !player.dead) triBtn.classList.add('ready');
  else triBtn.classList.remove('ready');
}

function addLog(text, type='system') {
  const div = document.createElement('div');
  div.className = 'log-entry log-'+type;
  div.textContent = text;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
  while (logEl.children.length > 40) logEl.removeChild(logEl.firstChild);
  // Keep cache for in-canvas display
  logCache.push({text, type});
  if (logCache.length > 40) logCache.shift();
}

// ============================================================
// GAME LOOP
// ============================================================
function moveFighter(fighter, dir) {
  if (fighter.dead || fighter.chargingUltimate > 0) return;
  if (dir==='left') fighter.vx = -MOVE_SPEED;
  else if (dir==='right') fighter.vx = MOVE_SPEED;
  else if (dir==='jump') { if (fighter.y>=GROUND_Y-1) { fighter.vy=JUMP_FORCE; setPose(fighter,'jump',30); fighter.jumpAngle=0.001; spawnParticles(fighter.x,GROUND_Y+45,'#55efc4',8,0.5); } }
}

function update() {
  if (slowMoFrames > 0) {
    slowMoFrames--;
    if (animFrame%3 !== 0) { animFrame++; return; }
  }
  animFrame++;

  if (!gameOver) updateAI();
  processJoystick();

  // Death timer
  if (deathTimer > 0) {
    deathTimer--;
    if (deathTimer <= 0) {
      deathOverlay.classList.remove('show');
    }
  }

  [player, ai].forEach(f => {
    // Ultimate charge timer
    if (f.chargingUltimate > 0) {
      f.chargingUltimate--;
      f.vx = 0; f.vy = Math.max(f.vy, 0); // freeze movement
      // Charge particles
      if (animFrame % 3 === 0) {
        spawnParticles(f.x, f.y - 20, '#ffeaa7', 3, 0.5);
      }
      // Pose
      if (f.targetPose !== 'ultimate') {
        setPose(f, 'ultimate', 200);
      } else if (f.poseTimer < 10) {
        f.poseTimer = 200;
      }
      if (f.chargingUltimate === 0) {
        // FIRE!
        const defender = f === player ? ai : player;
        const dist = Math.abs(f.x - defender.x);
        screenShake = 25;
        slowMoFrames = 20;
        document.getElementById('arenaWrap').style.filter = 'brightness(2.5)';
        setTimeout(() => { document.getElementById('arenaWrap').style.filter = ''; }, 300);
        spawnUltimateParticles(f.x, f.y);
        addLog(`${f.isAI?'🤖':'👤'} ▲ 終極大絕爆發！！！`, f.isAI?'ai':'player');
        if (dist < 220) {
          const dmg = defender.defending ? 25 : 50 + Math.floor(Math.random()*18);
          applyDamage(defender, dmg, f, true);
          addLog(`💥 命中！！！(-${dmg})`, f.isAI?'ai':'player');
        } else {
          addLog(`💥 打空！`, 'system');
          spawnUltimateParticles(f.x, f.y);
        }
        setPose(f, 'idle', 10);
      }
      return; // skip normal physics
    }

    if (f.dead) {
      // Dead body physics - slight settle
      f.vx *= 0.85;
      f.vy += GRAVITY*0.5;
      f.x += f.vx;
      if (f.y >= GROUND_Y+25) { f.y = GROUND_Y+25; f.vy = 0; }
      else f.y += f.vy;
      if (f.animProgress < 1) f.animProgress += 0.06;
      if (f.animProgress >= 1) f.animProgress = 1;
      return;
    }
    f.x += f.vx;
    f.y += f.vy;
    f.vy += GRAVITY;
    f.vx *= 0.82;
    // Jump flip rotation
    if (f.jumpAngle > 0) {
      if (f.vy < 0) f.jumpAngle += 0.3; // faster on way up
      else f.jumpAngle += 0.12; // slower on way down
      if (f.jumpAngle >= Math.PI * 2) f.jumpAngle = 0;
    }
    if (f.y > GROUND_Y) {
      f.y = GROUND_Y; f.vy = 0;
      if (f.jumpAngle > 0) {
        // Landing after flip → sit down
        f.jumpAngle = 0;
        f.pose = 'idle'; f.targetPose = 'sit';
        f.animProgress = 0; f.poseTimer = 25;
        spawnParticles(f.x, GROUND_Y+48, '#888', 5, 0.3);
      } else if (f.targetPose==='jump') {
        f.pose='jump'; f.targetPose='idle'; f.animProgress=0;
      }
    }
    f.x = Math.max(30, Math.min(ARENA_W-30, f.x));
    const other = f===player ? ai : player;
    f.facing = other.x > f.x ? 1 : -1;
    if (f.animProgress < 1) { f.animProgress += 0.14; if (f.animProgress >= 1) { f.animProgress=1; f.pose=f.targetPose; } }
    if (f.poseTimer > 0) { f.poseTimer--; if (f.poseTimer<=0 && f.targetPose!=='idle' && f.targetPose!=='defend') { f.pose=f.targetPose; f.targetPose='idle'; f.animProgress=0; } }
    if (f.defending && f.poseTimer<=0) { f.defending=false; f.pose='defend'; f.targetPose='idle'; f.animProgress=0; }
    if (f.hitFlash > 0) f.hitFlash--;
    if (f.speechTimer > 0 && !gameOver) f.speechTimer--;
  });

  // Idle breathing
  [player, ai].forEach(f => {
    if (!f.dead && f.targetPose==='idle' && f.animProgress>=1 && f.y>=GROUND_Y-1 && f.poseTimer<=0) {
      f.y = GROUND_Y + Math.sin(animFrame*0.04)*0.5;
    }
  });

  if (screenShake > 0) { screenShake *= 0.83; if (screenShake < 0.3) screenShake = 0; }
}

function render() {
  ctx.save();
  if (screenShake > 0) {
    ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
  }

  ctx.clearRect(-20,-20, ARENA_W+40, ARENA_H+40);
  const grad = ctx.createLinearGradient(0,0,0,ARENA_H);
  grad.addColorStop(0, '#0f1419'); grad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = grad; ctx.fillRect(0,0,ARENA_W,ARENA_H);

  // Ground
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y+52); ctx.lineTo(ARENA_W, GROUND_Y+52); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 1;
  for (let i=0; i<ARENA_W; i+=40) { ctx.beginPath(); ctx.moveTo(i,GROUND_Y+54); ctx.lineTo(i+20,ARENA_H); ctx.stroke(); }

  drawStickman(player);
  drawStickman(ai);
  drawProjectiles();
  drawParticles();

  // In-canvas log: player left-top, AI right-top
  ctx.save();
  ctx.font = '11px "Noto Sans HK", monospace';
  ctx.textBaseline = 'top';
  let px = 10, py = 8;
  ctx.fillStyle = '#feca57';
  ctx.fillText('👤', px - 2, py);
  px += 16;
  for (let i = logCache.length - 1; i >= 0 && py < 120; i--) {
    const e = logCache[i];
    if (e.type !== 'player' && e.type !== 'system') continue;
    ctx.fillStyle = e.type === 'player' ? '#feca57' : '#888';
    const txt = e.text.replace(/[👤🤖]/g,'').trim();
    if (ctx.measureText(txt).width < 280) {
      ctx.fillText(txt, px, py);
      py += 15;
    }
  }

  let ax = ARENA_W - 10;
  ctx.textAlign = 'right';
  ctx.fillStyle = '#48dbfb';
  ctx.fillText('🤖', ax - 8, 8);
  let ay = 8;
  for (let i = logCache.length - 1; i >= 0 && ay < 120; i--) {
    const e = logCache[i];
    if (e.type !== 'ai' && e.type !== 'system') continue;
    ctx.fillStyle = e.type === 'ai' ? '#48dbfb' : '#888';
    const txt = e.text.replace(/[👤🤖]/g,'').trim();
    if (ctx.measureText(txt).width < 280) {
      ctx.fillText(txt, ax, ay);
      ay += 15;
    }
  }
  ctx.textAlign = 'left';
  ctx.restore();
  ctx.restore();
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// INPUT
// ============================================================
// PS Buttons
document.querySelectorAll('.ps-btn').forEach(btn => {
  const handle = (e) => {
    e.preventDefault();
    if (!btn.disabled) {
      btn.classList.add('active');
      performAction(btn.dataset.action, player);
      setTimeout(() => btn.classList.remove('active'), 100);
    }
  };
  btn.addEventListener('touchstart', handle, {passive: false});
  btn.addEventListener('mousedown', handle);
});

// Keyboard
const keysDown = {};
document.addEventListener('keydown', (e) => {
  if (keysDown[e.key]) return;
  keysDown[e.key] = true;
  switch(e.key.toLowerCase()) {
    case 'a': case 'arrowleft': moveFighter(player, 'left'); break;
    case 'd': case 'arrowright': moveFighter(player, 'right'); break;
    case 'w': case 'arrowup': moveFighter(player, 'jump'); break;
    case 's': case 'arrowdown': player.defending=true; setPose(player,'defend',40); break;
    case 'j': performAction('slash', player); break;
    case 'k': performAction('ranged', player); break;
    case 'l': performAction('defend', player); break;
    case 'u': performAction('ultimate', player); break;
  }
});
document.addEventListener('keyup', (e) => { keysDown[e.key] = false; });

restartBtn.addEventListener('click', initGame);

// ============================================================
// START
// ============================================================
deathOverlay.classList.remove('show');
initGame();
gameLoop();
</script>

</html>
